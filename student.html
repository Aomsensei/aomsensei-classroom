<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ห้องเรียนออนไลน์ | นักเรียน</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#fff8f3;color:#333;min-height:100vh}
:root{--primary:#c94b00;--secondary:#f39800;--gradient:linear-gradient(135deg,#c94b00 0%,#f39800 100%)}

.login-screen{min-height:100vh;background:var(--gradient);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:20px;padding:36px 32px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.login-logo{width:80px;height:80px;border-radius:50%;object-fit:cover;margin-bottom:12px;border:3px solid #f39800}
.login-card h1{font-size:22px;font-weight:800;color:#c94b00;margin-bottom:3px}
.login-card .sub{font-size:13px;color:#999;margin-bottom:22px}
.input-group{position:relative;margin-bottom:12px}
.input-group i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#ffa040;font-size:15px}
.input-group input{width:100%;padding:12px 14px 12px 38px;border:2px solid #ffd0a0;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:.2s}
.input-group input:focus{border-color:#c94b00;background:#fffaf7}
.btn-login{width:100%;padding:14px;background:var(--gradient);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:.15s;margin-top:4px}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.login-err{background:#ffebee;color:#c62828;padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none;border-left:3px solid #c62828}
.login-hint{font-size:12px;color:#bbb;margin-top:12px}

.app-screen{display:none;flex-direction:column;min-height:100vh}
.top-bar{background:var(--gradient);color:#fff;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 3px 12px rgba(201,75,0,.4);position:sticky;top:0;z-index:50}
.top-bar-left{display:flex;align-items:center;gap:10px}
.top-bar-left img{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,.4);object-fit:cover}
.top-bar-left .name{font-size:14px;font-weight:800}
.top-bar-left .cls{font-size:11px;opacity:.85}
.btn-logout{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 12px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700}

.nav-tabs{display:flex;background:#e65c00;overflow-x:auto;scrollbar-width:none;position:sticky;top:57px;z-index:40}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex:1;min-width:58px;padding:9px 4px 7px;text-align:center;color:rgba(255,255,255,.7);cursor:pointer;font-size:11.5px;font-weight:700;border:none;background:none;white-space:nowrap;transition:.15s}
.nav-tab.active{background:#fff8f3;color:#c94b00;border-radius:8px 8px 0 0}
.nav-tab i{display:block;font-size:16px;margin-bottom:2px}

.tab-content{display:none;padding:14px}
.tab-content.active{display:block}
.section-title{font-size:17px;font-weight:800;color:#c94b00;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* Cards */
.ann-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(201,75,0,.1);border-top:3px solid #f39800}
.ann-title{font-size:15px;font-weight:800;color:#c94b00;margin-bottom:6px}
.ann-body{font-size:13.5px;color:#444;line-height:1.7;white-space:pre-wrap}
.ann-date{font-size:11px;color:#bbb;margin-top:6px}

.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(201,75,0,.1);border-left:4px solid #f39800}
.card-title{font-size:15px;font-weight:700;color:#333;margin-bottom:4px}
.card-meta{font-size:12px;color:#aaa;margin-bottom:7px}
.card-desc{font-size:13px;color:#555;line-height:1.6}
.card-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

.btn{padding:7px 14px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;transition:.15s;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.btn-orange{background:#c94b00;color:#fff}.btn-orange:hover{background:#a33b00}
.btn-blue{background:#1565c0;color:#fff}.btn-blue:hover{background:#0d47a1}
.btn-green{background:#2e7d32;color:#fff}.btn-green:hover{background:#1b5e20}
.btn-sm{padding:5px 10px;font-size:12px}

.quiz-card{background:#fff;border-radius:12px;padding:13px 14px;margin-bottom:10px;box-shadow:0 2px 12px rgba(201,75,0,.1);border-left:4px solid #c94b00;display:flex;align-items:center;justify-content:space-between;gap:10px}
.quiz-info{flex:1}
.quiz-title{font-size:14px;font-weight:700;color:#333}
.quiz-meta{font-size:11px;color:#aaa;margin-top:2px}
.score-badge{border-radius:20px;padding:3px 10px;font-size:12px;font-weight:800;white-space:nowrap}
.score-badge.pass{background:#e8f5e9;color:#2e7d32}
.score-badge.fail{background:#ffebee;color:#c62828}

.video-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:12px;box-shadow:0 2px 12px rgba(201,75,0,.1)}
.video-card iframe{width:100%;aspect-ratio:16/9;display:block;border:none}
.video-info{padding:10px 12px}
.video-title{font-size:14px;font-weight:700;color:#333;margin-bottom:2px}
.video-desc{font-size:12px;color:#777}

.score-table{width:100%;border-collapse:collapse;font-size:13px}
.score-table th{background:#c94b00;color:#fff;padding:9px 12px;text-align:left}
.score-table td{padding:9px 12px;border-bottom:1px solid #ffd0a0}
.score-table tr:nth-child(even) td{background:#fff3e8}
.grade-badge{background:#f39800;color:#fff;border-radius:12px;padding:2px 10px;font-weight:800;font-size:13px}

/* Chat */
.chat-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(201,75,0,.1);display:flex;flex-direction:column;height:calc(100vh - 175px);min-height:320px}
.chat-head{background:var(--gradient);color:#fff;padding:10px 14px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:10px}
.chat-head img{width:34px;height:34px;border-radius:50%;border:2px solid rgba(255,255,255,.4);object-fit:cover}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:78%;display:flex;flex-direction:column;gap:2px}
.msg.mine{align-self:flex-end;align-items:flex-end}
.msg.theirs{align-self:flex-start;align-items:flex-start}
.bubble{padding:9px 13px;border-radius:16px;font-size:14px;line-height:1.5;word-break:break-word}
.msg.mine .bubble{background:#c94b00;color:#fff;border-radius:16px 16px 4px 16px}
.msg.theirs .bubble{background:#f0f0f0;color:#333;border-radius:16px 16px 16px 4px}
.msg-time{font-size:10px;color:#bbb}
.msg-sender{font-size:10px;color:#c94b00;font-weight:700}
.chat-inp{padding:10px;border-top:1px solid #ffd0a0;display:flex;gap:8px}
.chat-inp input{flex:1;padding:10px 14px;border:1.5px solid #ffd0a0;border-radius:20px;font-size:14px;font-family:inherit;outline:none}
.chat-inp input:focus{border-color:#c94b00}
.chat-send-btn{background:#c94b00;color:#fff;border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.empty-state{text-align:center;padding:36px 20px;color:#ccc}
.empty-state i{font-size:44px;margin-bottom:10px;display:block}

/* PDF overlay */
#pdfOverlay{display:none;position:fixed;inset:0;background:#fff;z-index:9999;padding:20px;overflow:auto}
.pdf-toolbar{display:flex;gap:10px;margin-bottom:16px}
.pdf-toolbar button{padding:8px 18px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
.pdf-print{background:#c94b00;color:#fff}
.pdf-close{background:#546e7a;color:#fff}
@media print{.pdf-toolbar{display:none!important}.login-screen,.app-screen{display:none!important}#pdfOverlay{display:block!important;padding:0}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <img id="loginLogo" src="images/logo.png" class="login-logo" alt="โลโก้" data-site="logo"
      onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><circle cx=%2240%22 cy=%2240%22 r=%2240%22 fill=%22%23c94b00%22/><text x=%2240%22 y=%2252%22 font-size=%2236%22 text-anchor=%22middle%22 fill=%22white%22>🏫</text></svg>'"/>
    <h1>ห้องเรียนออนไลน์</h1>
    <div class="sub"><span data-site="school-name">โรงเรียนหินฝนวิทยาคม</span> · <span data-site="teacher-name">ครู รณฤทธิ์ ศรีสองเมือง</span></div>
    <div class="input-group">
      <i class="fas fa-key"></i>
      <input type="text" id="loginCode" placeholder="รหัสห้องเรียน" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="input-group">
      <i class="fas fa-user"></i>
      <input type="text" id="loginName" placeholder="ชื่อของนักเรียน" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-login" onclick="doLogin()">🚪 เข้าสู่ห้องเรียน</button>
    <div id="loginErr" class="login-err"></div>
    <div class="login-hint">ขอรหัสห้องเรียนจากครูผู้สอน</div>
    <a href="index.html" style="display:inline-block;margin-top:14px;color:#c94b00;font-size:13px;font-weight:700;text-decoration:none;opacity:.7">← กลับสู่หน้าหลัก</a>
  </div>
</div>

<!-- APP -->
<div id="appScreen" class="app-screen">
  <div class="top-bar">
    <div class="top-bar-left">
      <img src="images/logo.png" alt="logo" data-site="logo"
        onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><circle cx=%2220%22 cy=%2220%22 r=%2220%22 fill=%22rgba(255,255,255,.3)%22/><text x=%2220%22 y=%2227%22 font-size=%2218%22 text-anchor=%22middle%22 fill=%22white%22>🏫</text></svg>'"/>
      <div><div class="name" id="welcomeName">สวัสดี</div><div class="cls" id="welcomeCls">โรงเรียนหินฝนวิทยาคม</div></div>
    </div>
    <a href="index.html" class="btn-logout" style="text-decoration:none;margin-right:6px">🏠 หน้าหลัก</a>
    <button class="btn-logout" onclick="doLogout()">🚪 ออก</button>
  </div>

  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('ann')" id="tab-ann"><i class="fas fa-bullhorn"></i>ประกาศ</button>
    <button class="nav-tab" onclick="switchTab('ws')" id="tab-ws"><i class="fas fa-file-alt"></i>ใบงาน</button>
    <button class="nav-tab" onclick="switchTab('quiz')" id="tab-quiz"><i class="fas fa-pen-to-square"></i>ข้อสอบ</button>
    <button class="nav-tab" onclick="switchTab('vid')" id="tab-vid"><i class="fas fa-play-circle"></i>วิดีโอ</button>
    <button class="nav-tab" onclick="switchTab('score')" id="tab-score"><i class="fas fa-chart-bar"></i>คะแนน</button>
    <button class="nav-tab" onclick="switchTab('chat')" id="tab-chat"><i class="fas fa-comments"></i>แชทครู</button>
  </div>

  <div id="content-ann" class="tab-content active">
    <div class="section-title"><i class="fas fa-bullhorn"></i> ประกาศจากครู</div>
    <div id="listAnn"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div></div>
  </div>

  <div id="content-ws" class="tab-content">
    <div class="section-title"><i class="fas fa-file-alt"></i> ใบงาน</div>
    <div id="listWs"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div></div>
  </div>

  <div id="content-quiz" class="tab-content">
    <div class="section-title"><i class="fas fa-pen-to-square"></i> ข้อสอบออนไลน์</div>
    <div id="listQuiz"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div></div>
  </div>

  <div id="content-vid" class="tab-content">
    <div class="section-title"><i class="fas fa-play-circle"></i> วิดีโอการเรียนรู้</div>
    <div id="listVid"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div></div>
  </div>

  <div id="content-score" class="tab-content">
    <div class="section-title"><i class="fas fa-chart-bar"></i> ผลคะแนนของฉัน</div>
    <div id="listScore"><div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div></div>
  </div>

  <div id="content-chat" class="tab-content">
    <div class="chat-wrap">
      <div class="chat-head">
        <img src="images/teacher.jpg" alt="ครู" data-site="teacher-photo"
          onerror="this.onerror=null;this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 40 40%22><circle cx=%2220%22 cy=%2220%22 r=%2220%22 fill=%22%23f39800%22/><text x=%2220%22 y=%2227%22 font-size=%2220%22 text-anchor=%22middle%22 fill=%22white%22>👨‍🏫</text></svg>'"/>
        <div>
          <div data-site="teacher-name" style="font-weight:800;font-size:14px">ครู รณฤทธิ์ ศรีสองเมือง</div>
          <div style="font-size:11px;opacity:.85">ส่งคำถามได้เลยนะ!</div>
        </div>
      </div>
      <div id="chatMsgs" class="chat-msgs">
        <div class="empty-state"><i class="fas fa-comments" style="color:#ffd0a0"></i><p style="font-size:13px">ยังไม่มีข้อความ<br>ส่งคำถามให้ครูได้เลย!</p></div>
      </div>
      <div class="chat-inp">
        <input type="text" id="chatInput" placeholder="พิมพ์คำถาม..." onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="chat-send-btn" onclick="sendChat()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- PDF Overlay -->
<div id="pdfOverlay">
  <div class="pdf-toolbar">
    <button class="pdf-print" onclick="window.print()">🖨️ พิมพ์ / บันทึก PDF</button>
    <button class="pdf-close" onclick="closePdf()">✕ ปิด</button>
  </div>
  <div id="pdfContent" style="max-width:800px;margin:0 auto"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, collection, getDocs, addDoc, query, where, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { FIREBASE_CONFIG } from "./js/config.js";

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);

async function loadSiteSettings(){
  try{
    const snap = await getDoc(doc(db,'settings','site'));
    if(!snap.exists()) return;
    const s = snap.data();
    if(s.logoUrl) document.querySelectorAll('[data-site="logo"]').forEach(el=>el.src=s.logoUrl);
    if(s.teacherPhotoUrl) document.querySelectorAll('[data-site="teacher-photo"]').forEach(el=>el.src=s.teacherPhotoUrl);
    if(s.teacherName) document.querySelectorAll('[data-site="teacher-name"]').forEach(el=>el.textContent=s.teacherName);
    if(s.teacherRole) document.querySelectorAll('[data-site="teacher-role"]').forEach(el=>el.textContent=s.teacherRole);
    if(s.schoolName) document.querySelectorAll('[data-site="school-name"]').forEach(el=>el.textContent=s.schoolName);
  }catch(e){ console.warn('loadSiteSettings:',e); }
}
loadSiteSettings();

let student = null;  // { roomId, roomName, name }
let chatUnsub = null;
let _quizCache = {};
window._worksheets = {};

// ==================== LOGIN ====================
window.doLogin = async function(){
  const code = document.getElementById('loginCode').value.trim().toUpperCase();
  const name = document.getElementById('loginName').value.trim();
  const err = document.getElementById('loginErr');
  if(!code || !name){ err.textContent = '⚠️ กรุณากรอกรหัสห้องและชื่อ'; err.style.display='block'; return; }
  err.style.display='none';
  try{
    const snap = await getDocs(collection(db,'classrooms'));
    let room = null;
    snap.forEach(d => {
      const r = d.data();
      if((r.code||'').toUpperCase() === code) room = {id: d.id, ...r};
    });
    if(!room){ err.textContent = '❌ ไม่พบรหัสห้อง "'+code+'" กรุณาตรวจสอบใหม่'; err.style.display='block'; return; }
    student = { roomId: room.id, roomName: room.name || room.id, name };
    document.getElementById('welcomeName').textContent = 'สวัสดี ' + name;
    document.getElementById('welcomeCls').textContent = room.name + ' · โรงเรียนหินฝนวิทยาคม';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    loadAll();
  }catch(e){
    err.textContent = '❌ เกิดข้อผิดพลาด: ' + e.message;
    err.style.display='block';
  }
};

window.doLogout = function(){
  if(chatUnsub){ chatUnsub(); chatUnsub = null; }
  student = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginCode').value = '';
  document.getElementById('loginName').value = '';
};

// ==================== TABS ====================
window.switchTab = function(t){
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('content-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t === 'chat') initChat();
};

// ==================== LOAD ALL ====================
function loadAll(){
  loadAnn(); loadWs(); loadQuiz(); loadVid(); loadScore();
}

// ==================== ANNOUNCEMENTS ====================
async function loadAnn(){
  const el = document.getElementById('listAnn');
  try{
    const q = query(collection(db,'announcements'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    let h = '';
    snap.forEach(d => {
      const a = d.data();
      if(a.roomId && a.roomId!=='all' && a.roomId!==student.roomId) return;
      const dt = a.createdAt?.toDate?.()?.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'}) || '';
      h += `<div class="ann-card">${a.imageUrl?`<img src="${a.imageUrl}" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:8px" onerror="this.style.display='none'">`:''}<div class="ann-title">${a.title||'ประกาศ'}</div><div class="ann-body">${a.content||''}</div><div class="ann-date">📅 ${dt}</div></div>`;
    });
    el.innerHTML = h || '<div class="empty-state"><i class="fas fa-bullhorn"></i><p>ยังไม่มีประกาศ</p></div>';
  }catch(e){ el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>โหลดไม่ได้: ${e.message}</p></div>`; }
}

// ==================== WORKSHEETS ====================
async function loadWs(){
  const el = document.getElementById('listWs');
  try{
    const q = query(collection(db,'worksheets'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    let h = '';
    snap.forEach(d => {
      const w = d.data();
      if(w.roomId && w.roomId!=='all' && w.roomId!==student.roomId) return;
      window._worksheets[d.id] = w;
      const dt = w.createdAt?.toDate?.()?.toLocaleDateString('th-TH') || '';
      h += `<div class="card">
        <div class="card-title">📄 ${w.title||'ใบงาน'}</div>
        <div class="card-meta">📅 ${dt}${w.subject?' · '+w.subject:''}</div>
        <div class="card-desc">${w.description||''}</div>
        <div class="card-actions">
          ${w.fileUrl?`<a href="${w.fileUrl}" target="_blank" class="btn btn-orange btn-sm">📖 เปิดไฟล์</a>`:''}
          ${w.htmlContent?`<button class="btn btn-orange btn-sm" onclick="openWs('${d.id}')">📖 เปิดใบงาน</button>`:''}
          <button class="btn btn-blue btn-sm" onclick="printWs('${d.id}')">🖨️ พิมพ์ PDF</button>
        </div></div>`;
    });
    el.innerHTML = h || '<div class="empty-state"><i class="fas fa-file-alt"></i><p>ยังไม่มีใบงาน</p></div>';
  }catch(e){ el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>โหลดไม่ได้: ${e.message}</p></div>`; }
}
window.openWs = function(id){ const w = window._worksheets[id]; if(!w?.htmlContent) return; const b = window.open('','_blank'); b.document.write(w.htmlContent); b.document.close(); };
window.printWs = function(id){
  const w = window._worksheets[id]; if(!w) return;
  const content = w.htmlContent || `<div style="font-family:'Sarabun',sans-serif;padding:30px">
    <h2 style="color:#c94b00;border-bottom:2px solid #f39800;padding-bottom:8px">${w.title||'ใบงาน'}</h2>
    ${w.subject?`<p style="color:#888;margin:6px 0">วิชา: ${w.subject}</p>`:''}
    ${w.description?`<div style="margin-top:14px;line-height:2;font-size:15px">${w.description}</div>`:''}
    <p style="margin-top:40px;border-top:1px dashed #ccc;padding-top:16px;color:#aaa;font-size:12px;text-align:center">โรงเรียนหินฝนวิทยาคม · ครู รณฤทธิ์ ศรีสองเมือง</p>
  </div>`;
  document.getElementById('pdfContent').innerHTML = content;
  document.getElementById('pdfOverlay').style.display = 'block';
  document.title = w.title || 'ใบงาน';
};
window.closePdf = function(){ document.getElementById('pdfOverlay').style.display = 'none'; document.title = 'ห้องเรียนออนไลน์ | นักเรียน'; };

// ==================== QUIZZES ====================
async function loadQuiz(){
  const el = document.getElementById('listQuiz');
  try{
    const q = query(collection(db,'quizzes'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    const results = {};
    try{
      const rq = query(collection(db,'quiz_results'), where('studentId','==', student.name+'_'+student.roomId));
      const rs = await getDocs(rq);
      rs.forEach(d => results[d.data().quizId] = d.data());
    }catch(e){}
    let h = ''; _quizCache = {};
    snap.forEach(d => {
      const qz = d.data();
      if(qz.roomId && qz.roomId!=='all' && qz.roomId!==student.roomId) return;
      _quizCache[d.id] = qz; const done = results[d.id];
      const dt = qz.createdAt?.toDate?.()?.toLocaleDateString('th-TH') || '';
      const isHtml = qz.quizType === 'html';
      if(isHtml){
        h += `<div class="quiz-card">
          <div class="quiz-info">
            <div class="quiz-title">📄 ${qz.title||'ข้อสอบ'} <span style="background:#1565c0;color:#fff;border-radius:4px;padding:1px 5px;font-size:10px;vertical-align:middle">HTML</span></div>
            <div class="quiz-meta">ข้อสอบรูปแบบไฟล์${dt?' · '+dt:''}</div>
          </div>
          <button class="btn btn-blue btn-sm" onclick="openHtmlQuiz('${d.id}')">เปิดข้อสอบ</button>
        </div>`;
      } else {
        const pass = done && done.score >= (qz.passingScore||60);
        h += `<div class="quiz-card">
          <div class="quiz-info">
            <div class="quiz-title">📝 ${qz.title||'ข้อสอบ'}</div>
            <div class="quiz-meta">⏱️ ${qz.timeLimit||30} นาที · ${(qz.questions||[]).length} ข้อ · ผ่าน ${qz.passingScore||60}%${dt?' · '+dt:''}</div>
          </div>
          ${done
            ? `<span class="score-badge ${pass?'pass':'fail'}">${done.score}%${pass?' ✓':' ✗'}</span>`
            : `<button class="btn btn-orange btn-sm" onclick="startQuiz('${d.id}')">เริ่มสอบ</button>`}
        </div>`;
      }
    });
    el.innerHTML = h || '<div class="empty-state"><i class="fas fa-pen-to-square"></i><p>ยังไม่มีข้อสอบ</p></div>';
  }catch(e){ el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>โหลดไม่ได้: ${e.message}</p></div>`; }
}
window.startQuiz = function(id){
  window.location.href = `quiz.html?id=${id}&student=${encodeURIComponent(student.name)}&room=${encodeURIComponent(student.roomId)}`;
};
window.openHtmlQuiz = function(id){
  const qz = _quizCache && _quizCache[id];
  if(qz && qz.htmlUrl) window.open(qz.htmlUrl, '_blank');
  else {
    // fallback: ดึงจาก Firestore
    import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js").then(({getDoc,doc:fiDoc})=>{
      getDoc(fiDoc(db,'quizzes',id)).then(snap=>{
        if(snap.exists()&&snap.data().htmlUrl) window.open(snap.data().htmlUrl,'_blank');
      });
    });
  }
};

// ==================== VIDEOS ====================
async function loadVid(){
  const el = document.getElementById('listVid');
  try{
    const q = query(collection(db,'videos'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    let h = '';
    snap.forEach(d => {
      const v = d.data();
      if(v.roomId && v.roomId!=='all' && v.roomId!==student.roomId) return;
      const embed = ytEmbed(v.url||'');
      h += `<div class="video-card">
        ${embed
          ? `<iframe src="${embed}" allowfullscreen loading="lazy"></iframe>`
          : `<div style="background:#f5f5f5;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center"><a href="${v.url}" target="_blank" style="color:#c94b00;font-weight:700;font-size:15px;text-decoration:none">▶️ เปิดวิดีโอ</a></div>`}
        <div class="video-info"><div class="video-title">${v.title||'วิดีโอ'}</div><div class="video-desc">${v.description||''}</div></div>
      </div>`;
    });
    el.innerHTML = h || '<div class="empty-state"><i class="fas fa-play-circle"></i><p>ยังไม่มีวิดีโอ</p></div>';
  }catch(e){ el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>โหลดไม่ได้: ${e.message}</p></div>`; }
}
function ytEmbed(url){
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m ? 'https://www.youtube.com/embed/'+m[1] : '';
}

// ==================== SCORES ====================
async function loadScore(){
  const el = document.getElementById('listScore');
  try{
    const q = query(collection(db,'quiz_results'), where('studentId','==', student.name+'_'+student.roomId));
    const snap = await getDocs(q);
    if(snap.empty){ el.innerHTML = '<div class="empty-state"><i class="fas fa-chart-bar"></i><p>ยังไม่มีคะแนน<br>ลองทำข้อสอบก่อนนะ!</p></div>'; return; }
    let h = `<table class="score-table"><thead><tr><th>ข้อสอบ</th><th>คะแนน</th><th>ถูก/ทั้งหมด</th><th>วันที่สอบ</th></tr></thead><tbody>`;
    let total = 0, count = 0;
    snap.forEach(d => {
      const r = d.data();
      const dt = r.submittedAt?.toDate?.()?.toLocaleDateString('th-TH') || '';
      const pass = r.score >= (r.passingScore||60);
      total += r.score||0; count++;
      h += `<tr><td>${r.quizTitle||r.quizId||'-'}</td><td><span class="grade-badge" style="background:${pass?'#2e7d32':'#c62828'}">${r.score||0}%</span></td><td>${r.correct||0}/${r.total||0}</td><td>${dt}</td></tr>`;
    });
    h += `</tbody></table>`;
    if(count > 1) h += `<div style="margin-top:10px;padding:10px 14px;background:#fff3e0;border-radius:8px;font-size:13px;font-weight:700;color:#7c4700">📊 คะแนนเฉลี่ย: ${Math.round(total/count)}%</div>`;
    el.innerHTML = h;
  }catch(e){ el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>โหลดไม่ได้: ${e.message}</p></div>`; }
}

// ==================== CHAT ====================
function initChat(){
  if(!student || chatUnsub) return;
  const q = query(collection(db,'chats', student.roomId,'messages'), orderBy('createdAt','asc'));
  chatUnsub = onSnapshot(q, snap => {
    const el = document.getElementById('chatMsgs');
    if(snap.empty){
      el.innerHTML = '<div class="empty-state"><i class="fas fa-comments" style="color:#ffd0a0"></i><p style="font-size:13px">ยังไม่มีข้อความ ส่งคำถามให้ครูได้เลย!</p></div>';
      return;
    }
    let h = '';
    snap.forEach(d => {
      const m = d.data();
      const mine = m.role === 'student' && m.sender === student.name;
      const dt = m.createdAt?.toDate?.()?.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}) || '';
      h += `<div class="msg ${mine?'mine':'theirs'}">
        ${!mine ? `<div class="msg-sender">${m.sender||'ครู'}</div>` : ''}
        <div class="bubble">${m.text}</div>
        <div class="msg-time">${dt}</div>
      </div>`;
    });
    el.innerHTML = h;
    el.scrollTop = el.scrollHeight;
  }, err => {
    document.getElementById('chatMsgs').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p style="font-size:13px">โหลดแชทไม่ได้: ${err.message}</p></div>`;
  });
}

window.sendChat = async function(){
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if(!text || !student) return;
  inp.value = '';
  try{
    await addDoc(collection(db,'chats', student.roomId,'messages'),{
      text, sender: student.name, role: 'student', createdAt: serverTimestamp()
    });
  }catch(e){ alert('ส่งข้อความไม่ได้: '+e.message); }
};
