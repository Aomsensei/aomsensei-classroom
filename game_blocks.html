<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🤖 เกมต่อบล็อคโปรแกรม</title>
<style>
:root{
  --orange:#ff6b00;--orange-lt:#ff9a3c;
  --dark:#1a1a2e;--darker:#12122a;--panel:#16213e;--card:#0f3460;
  --text:#e0e0e0;--ok:#4CAF50;
  --c-move:#4C97FF;--c-ctrl:#FFAB19;--c-pen:#59C059;
  --c-var:#9966FF;--c-fn:#FF6680;--c-look:#e879a0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--dark);color:var(--text);
  height:100vh;display:flex;flex-direction:column;overflow:hidden;touch-action:manipulation;}

/* ── HEADER ── */
.hd{background:linear-gradient(90deg,#ff6b00,#ff9a3c);padding:6px 14px;
  display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.4);flex-shrink:0;min-height:38px;}
.hd h1{font-size:15px;font-weight:700;white-space:nowrap;}
.hd select{margin-left:auto;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.4);
  color:#fff;padding:3px 8px;border-radius:7px;font-size:11px;cursor:pointer;max-width:220px;}

/* ── MOBILE TABS ── */
.mob-tabs{display:none;background:#0d1022;padding:4px 8px;gap:5px;flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.07);}
.mob-tab{flex:1;padding:7px 4px;border:1px solid rgba(255,255,255,.14);border-radius:7px;
  background:rgba(255,255,255,.05);color:#888;font-size:12px;font-weight:700;cursor:pointer;
  transition:background .15s;}
.mob-tab.active{background:linear-gradient(135deg,#ff6b00,#ff9a3c);color:#fff;border-color:transparent;}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;min-height:0;}

/* PALETTE */
.palette{width:152px;background:var(--panel);padding:6px 5px;overflow-y:auto;
  border-right:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.pal-title{font-size:9px;text-transform:uppercase;color:#666;margin:7px 4px 3px;
  letter-spacing:.5px;border-top:1px solid rgba(255,255,255,.05);padding-top:5px;}
.pal-title:first-child{border-top:none;margin-top:0;}
.blk-btn{display:block;width:100%;margin-bottom:3px;padding:5px 8px;border:none;
  border-radius:7px;cursor:pointer;font-size:11px;font-weight:700;color:#fff;text-align:left;
  transition:filter .12s,transform .1s;line-height:1.3;-webkit-tap-highlight-color:transparent;}
.blk-btn:hover{filter:brightness(1.18);}
.blk-btn:active{transform:scale(.95);}
.blk-btn small{font-size:9px;font-weight:400;opacity:.72;display:block;}

/* WORKSPACE */
.ws{flex:1;background:var(--darker);display:flex;flex-direction:column;min-width:0;min-height:0;}
.ws-bar{display:flex;align-items:center;gap:5px;padding:5px 9px;
  border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;}
.ws-bar h3{font-size:11px;color:#555;margin-right:auto;}
.btn-run{background:var(--ok);color:#fff;border:none;padding:5px 12px;border-radius:7px;
  cursor:pointer;font-size:13px;font-weight:700;transition:filter .12s;flex-shrink:0;}
.btn-run:hover{filter:brightness(1.1);}
.btn-cl{background:#3a3a4a;color:#bbb;border:none;padding:5px 9px;border-radius:7px;
  cursor:pointer;font-size:12px;flex-shrink:0;}
.ws-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:7px 9px;
  display:flex;flex-direction:column;gap:3px;min-height:0;}
.ws-empty{color:#444;font-size:12px;text-align:center;margin-top:36px;line-height:1.7;}

/* WORKSPACE BLOCKS */
.wb{display:flex;align-items:center;flex-wrap:wrap;gap:4px;padding:5px 7px;border-radius:7px;
  font-size:11px;font-weight:700;color:#fff;cursor:grab;min-height:30px;flex-shrink:0;
  touch-action:none;-webkit-user-select:none;user-select:none;}
.wb:active{cursor:grabbing;}
.wb.drag-over-top{box-shadow:0 -2px 0 0 #fff;}
.wb.drag-over-bot{box-shadow:0 2px 0 0 #fff;}
.wb input[type=number]{width:46px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.28);
  color:#fff;padding:1px 4px;border-radius:4px;font-size:11px;text-align:center;cursor:text;
  touch-action:auto;}
.wb input[type=text]{width:44px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.28);
  color:#fff;padding:1px 4px;border-radius:4px;font-size:11px;cursor:text;touch-action:auto;}
.wb input.wide-txt{width:82px;}
.wb input[type=color]{width:26px;height:20px;border:none;background:none;cursor:pointer;padding:0;}
.wb select.wb-sel{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.25);color:#fff;
  border-radius:4px;padding:1px;font-size:10px;}
.del-btn{margin-left:auto;background:rgba(0,0,0,.3);border:none;color:rgba(255,255,255,.45);
  width:16px;height:16px;border-radius:3px;cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.del-btn:hover{background:rgba(255,50,50,.5);color:#fff;}
.unit-lbl{font-size:9px;opacity:.65;flex-shrink:0;}

/* REPEAT wrapper */
.repeat-wrap{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.repeat-body{margin-left:16px;border-left:3px solid rgba(255,171,25,.35);
  padding:4px 0 4px 7px;display:flex;flex-direction:column;gap:3px;min-height:38px;}
.repeat-body.drag-over{background:rgba(255,171,25,.15)!important;border-left-color:#ffab19;}
.repeat-drop-hint{border:2px dashed rgba(255,171,25,.5);border-radius:5px;
  padding:8px 5px;font-size:11px;color:#ffab19;text-align:center;pointer-events:none;}
.repeat-end{margin-left:16px;padding:2px 9px;border-radius:0 0 5px 5px;
  font-size:10px;color:rgba(255,255,255,.4);font-style:italic;}

/* CANVAS PANEL */
.cv-panel{width:330px;background:var(--panel);display:flex;flex-direction:column;
  border-left:1px solid rgba(255,255,255,.08);flex-shrink:0;overflow-y:auto;}
.zoom-bar{display:flex;align-items:center;gap:4px;padding:4px 8px;
  background:var(--darker);border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.zoom-bar span{font-size:11px;color:#555;margin-right:auto;}
.zoom-btn{background:#2a2a3a;border:1px solid rgba(255,255,255,.12);color:#bbb;
  width:24px;height:22px;border-radius:5px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;}
.zoom-btn:hover{background:#3a3a4a;color:#fff;}
#zoomPct{font-size:11px;color:#888;min-width:38px;text-align:center;}
.cv-wrap{flex:1;overflow:hidden;position:relative;background:#111827;
  cursor:grab;min-height:160px;}
.cv-wrap.panning{cursor:grabbing;}
canvas{display:block;width:100%;height:100%;}
.ex-info{padding:8px 11px;background:var(--card);border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;}
.ex-info h4{font-size:12px;color:var(--orange-lt);margin-bottom:2px;}
.ex-info p{font-size:11px;color:#999;line-height:1.5;}
.ex-status{padding:5px 11px;font-size:11px;text-align:center;color:#777;
  border-top:1px solid rgba(255,255,255,.05);flex-shrink:0;min-height:26px;}
.success-bar{display:none;padding:7px 11px;background:#1a3d1a;color:#7dff7d;
  font-size:13px;font-weight:700;text-align:center;border-top:2px solid var(--ok);
  animation:fadeUp .4s ease;flex-shrink:0;}
.success-bar.show{display:block;}
.speed-row{display:flex;align-items:center;gap:6px;padding:4px 9px;
  font-size:10px;color:#555;border-top:1px solid rgba(255,255,255,.04);flex-shrink:0;}
.speed-row input{flex:1;}

/* SUBMIT ROW */
.submit-row{padding:8px 9px;border-top:2px solid rgba(255,107,0,.35);flex-shrink:0;background:#1a1228;display:flex;justify-content:center;}
.btn-submit{background:linear-gradient(135deg,#f39800,#e06000);color:#fff;border:none;
  padding:9px 0;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;
  width:100%;transition:filter .12s;box-shadow:0 2px 8px rgba(243,152,0,.4);}
.btn-submit:hover{filter:brightness(1.12);}

/* SUBMIT MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;
  align-items:center;justify-content:center;padding:10px;}
.modal-overlay.show{display:flex;}
.modal-box{background:#1a1a2e;border:1px solid rgba(255,107,0,.4);border-radius:14px;
  padding:20px 22px;width:360px;max-width:96vw;max-height:92vh;overflow-y:auto;
  box-shadow:0 8px 36px rgba(0,0,0,.65);}
.modal-box h2{font-size:15px;color:#ff9a3c;margin-bottom:12px;text-align:center;}
.modal-ex-badge{text-align:center;font-size:11px;color:#888;margin-bottom:12px;
  background:rgba(255,255,255,.05);padding:4px 10px;border-radius:6px;}
.modal-field{margin-bottom:10px;}
.modal-field label{display:block;font-size:11px;color:#888;margin-bottom:3px;}
.modal-field input,.modal-field select{width:100%;background:#0f3460;border:1px solid rgba(255,255,255,.15);
  color:#e0e0e0;padding:7px 10px;border-radius:7px;font-size:13px;outline:none;}
.modal-field input:focus,.modal-field select:focus{border-color:rgba(255,107,0,.55);}
.modal-row2{display:flex;gap:8px;}
.modal-row2 .modal-field{flex:1;}
/* code preview */
.modal-code-preview{background:#0a0a18;border:1px solid rgba(255,255,255,.1);border-radius:7px;
  padding:8px 10px;font-size:10px;font-family:monospace;color:#7ec8e3;
  max-height:110px;overflow-y:auto;margin-bottom:10px;white-space:pre;line-height:1.5;}
.modal-code-label{font-size:10px;color:#556;margin-bottom:4px;}
.modal-code-empty{color:#444;font-style:italic;}
.modal-btns{display:flex;gap:8px;margin-top:12px;}
.modal-btn-ok{flex:1;background:#ff6b00;color:#fff;border:none;padding:8px;border-radius:7px;
  font-size:13px;font-weight:700;cursor:pointer;transition:filter .12s;}
.modal-btn-ok:hover:not(:disabled){filter:brightness(1.1);}
.modal-btn-ok:disabled{opacity:.45;cursor:default;}
.modal-btn-cancel{flex:0 0 auto;background:#2a2a3a;color:#bbb;border:none;padding:8px 14px;
  border-radius:7px;font-size:12px;cursor:pointer;}
.modal-btn-cancel:hover{background:#3a3a4a;color:#fff;}
.modal-status{font-size:11px;text-align:center;color:#888;margin-top:8px;min-height:16px;}

/* TOUCH DRAG GHOST */
.td-ghost{position:fixed;pointer-events:none;z-index:9998;border-radius:7px;
  opacity:.82;box-shadow:0 10px 28px rgba(0,0,0,.6);transform:scale(1.05);}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.13);border-radius:3px;}

/* ── RESPONSIVE: MOBILE ≤ 760px ── */
@media (max-width:760px){
  body{overflow:hidden;}
  .mob-tabs{display:flex;}
  .main{overflow:hidden;}
  /* Palette: horizontal strip */
  .palette{
    width:100%;max-height:none;height:auto;
    flex-direction:row;flex-wrap:nowrap;
    overflow-x:auto;overflow-y:hidden;
    padding:5px 6px;gap:4px;
    border-right:none;border-bottom:1px solid rgba(255,255,255,.08);
    display:flex;align-items:center;
  }
  .pal-title{display:none;}
  .blk-btn{display:inline-flex!important;width:auto;white-space:nowrap;
    margin-bottom:0;margin-right:0;flex-shrink:0;padding:5px 9px;font-size:11px;}
  .blk-btn small{display:none;}
  /* Workspace: takes remaining height, palette strip on top */
  .ws{flex-direction:column;min-height:0;}
  /* Canvas panel */
  .cv-panel{width:100%;border-left:none;flex-shrink:0;}
  .cv-wrap{min-height:200px;max-height:45vh;}
  /* Submit button always visible in panel */
  .submit-row.show{padding:8px;}
  /* Tab switching */
  .ws.mob-hidden{display:none;}
  .cv-panel.mob-hidden{display:none;}
  .palette.mob-hidden{display:none;}
}
</style>
</head>
<body>

<div class="hd">
  <span>🤖</span>
  <h1>เกมต่อบล็อคโปรแกรม</h1>
  <select id="exSel" onchange="loadExercise(+this.value)">
    <option value="0">แบบฝึกหัด 1 — เดินหน้า (พื้นฐาน)</option>
    <option value="1">แบบฝึกหัด 2 — หมุนและเดิน</option>
    <option value="2">แบบฝึกหัด 3 — วาดรูปตัว L</option>
    <option value="3">แบบฝึกหัด 4 — สี่เหลี่ยม (ไม่ใช้ลูป)</option>
    <option value="4">แบบฝึกหัด 5 — สี่เหลี่ยม (ใช้ทำซ้ำ)</option>
    <option value="5">แบบฝึกหัด 6 — วาดสามเหลี่ยม</option>
    <option value="6">แบบฝึกหัด 7 — วาดดาว 5 แฉก</option>
    <option value="7">แบบฝึกหัด 8 — วาดวงกลม</option>
    <option value="8">แบบฝึกหัด 9 — ยกปากกาและวางปากกา</option>
    <option value="9">แบบฝึกหัด 10 — สร้างสรรค์อิสระ 🎨</option>
  </select>
</div>

<!-- Mobile tab bar -->
<div class="mob-tabs" id="mobTabs">
  <button class="mob-tab active" id="tabCode"   onclick="switchMobTab('code')">📋 โค้ด</button>
  <button class="mob-tab"        id="tabScreen" onclick="switchMobTab('screen')">🖥 หน้าจอ</button>
</div>

<div class="main" id="mainLayout">

  <!-- PALETTE -->
  <div class="palette" id="palette"></div>

  <!-- WORKSPACE -->
  <div class="ws" id="wsPanel">
    <div class="ws-bar">
      <h3>📋 โค้ดของฉัน</h3>
      <button class="btn-cl" onclick="clearWS()">🗑</button>
      <button class="btn-run" id="btnRun" onclick="runProgram()">▶ รัน</button>
    </div>
    <div class="ws-body" id="wsBody">
      <div class="ws-empty" id="wsEmpty">← คลิกบล็อคเพื่อเพิ่มที่นี่<br>หรือลากเรียงลำดับได้</div>
    </div>
  </div>

  <!-- CANVAS PANEL -->
  <div class="cv-panel mob-hidden" id="cvPanel">
    <div class="zoom-bar">
      <span>🖥 หน้าจอแสดงผล</span>
      <button class="zoom-btn" onclick="doZoom(-1)" title="ย่อ">−</button>
      <span id="zoomPct">100%</span>
      <button class="zoom-btn" onclick="doZoom(1)" title="ขยาย">+</button>
      <button class="zoom-btn" onclick="doZoom(0)" title="รีเซ็ต" style="font-size:11px">↺</button>
      <span style="font-size:10px;color:#444;margin-left:2px">✋ ลาก</span>
    </div>
    <div class="cv-wrap" id="cvWrap">
      <canvas id="cv"></canvas>
    </div>
    <div class="ex-info">
      <h4 id="exTitle">แบบฝึกหัด</h4>
      <p id="exDesc"></p>
    </div>
    <div class="success-bar" id="successBar">🎉 ยอดเยี่ยม! ทำสำเร็จแล้ว!</div>
    <div class="ex-status" id="exStatus">พร้อมแล้ว กด ▶ รัน เพื่อเริ่ม</div>
    <div class="speed-row">
      <span>🐢</span>
      <input type="range" id="speedSlider" min="1" max="10" value="5" title="ความเร็ว">
      <span>🐇</span>
    </div>
    <div class="submit-row" id="submitRow">
      <button class="btn-submit" id="btnSubmitMain" onclick="openSubmitModal()">📤 ส่งงาน</button>
    </div>
  </div>

</div><!-- end .main -->

<!-- SUBMIT MODAL -->
<div class="modal-overlay" id="submitModal">
  <div class="modal-box">
    <h2>📤 ส่งงานโปรแกรม</h2>
    <div class="modal-ex-badge" id="modalExBadge">แบบฝึกหัดที่ 1 — เดินหน้า</div>

    <!-- ข้อมูลนักเรียน -->
    <div class="modal-field">
      <label>👤 ชื่อ – นามสกุล</label>
      <input type="text" id="fieldName" placeholder="เช่น สมชาย ใจดี" autocomplete="off">
    </div>
    <div class="modal-row2">
      <div class="modal-field">
        <label>🏫 ชั้น</label>
        <select id="fieldClass">
          <option>ป.4/1</option><option>ป.4/2</option><option>ป.4/3</option>
          <option>ป.5/1</option><option>ป.5/2</option><option>ป.5/3</option>
          <option>ป.6/1</option><option>ป.6/2</option><option>ป.6/3</option>
          <option>ม.1/1</option><option>ม.1/2</option><option>ม.1/3</option>
          <option>ม.2/1</option><option>ม.2/2</option><option>ม.2/3</option>
          <option>ม.3/1</option><option>ม.3/2</option><option>ม.3/3</option>
        </select>
      </div>
      <div class="modal-field">
        <label>#️⃣ เลขที่</label>
        <input type="number" id="fieldNum" min="1" max="60" placeholder="เลขที่">
      </div>
    </div>

    <!-- โค้ด preview -->
    <div class="modal-code-label">📋 โค้ดที่จะส่ง</div>
    <div class="modal-code-preview" id="codePreview"><span class="modal-code-empty">ยังไม่มีบล็อค</span></div>

    <div class="modal-btns">
      <button class="modal-btn-ok" id="btnSubmitOk" onclick="doSubmit()">✅ ส่งงาน</button>
      <button class="modal-btn-cancel" onclick="closeSubmitModal()">ยกเลิก</button>
    </div>
    <div class="modal-status" id="submitStatus"></div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   BLOCK DEFINITIONS
═══════════════════════════════════════════════════════════ */
const DEFS = {
  /* ── การเคลื่อนที่ ── */
  move:            {label:'เดินหน้า',            color:'#4C97FF', cat:'move',
                    params:[{k:'dist',type:'num',val:100,unit:'ก้าว'}]},
  move_back:       {label:'เดินถอย',             color:'#4C97FF', cat:'move',
                    params:[{k:'dist',type:'num',val:50,unit:'ก้าว'}]},
  turn_right:      {label:'หมุนขวา',             color:'#4C97FF', cat:'move',
                    params:[{k:'ang',type:'num',val:90,unit:'°'}]},
  turn_left:       {label:'หมุนซ้าย',            color:'#4C97FF', cat:'move',
                    params:[{k:'ang',type:'num',val:90,unit:'°'}]},
  set_angle:       {label:'ตั้งทิศทาง',          color:'#4C97FF', cat:'move',
                    params:[{k:'ang',type:'num',val:0,unit:'°'}]},
  set_xy:          {label:'ไปยังตำแหน่ง',       color:'#4C97FF', cat:'move',
                    params:[{k:'x',type:'num',val:0,unit:'x'},{k:'y',type:'num',val:0,unit:'y'}]},
  home:            {label:'กลับจุดเริ่มต้น',    color:'#4C97FF', cat:'move', params:[]},
  move_to_random:  {label:'ไปตำแหน่งสุ่ม',      color:'#2196F3', cat:'move', params:[]},
  bounce_edge:     {label:'กระดอนเมื่อชนขอบ',   color:'#00BCD4', cat:'move', params:[]},

  /* ── การควบคุม ── */
  repeat:          {label:'ทำซ้ำ',               color:'#FFAB19', cat:'ctrl',
                    params:[{k:'times',type:'num',val:4,unit:'ครั้ง'}], hasBody:true},
  repeat_count:    {label:'ทำซ้ำและนับ',         color:'#FF8C00', cat:'ctrl',
                    params:[{k:'var',type:'txt',val:'i'},{k:'to',type:'num',val:5,unit:'ครั้ง'}], hasBody:true},
  repeat_until_edge:{label:'ทำซ้ำจนกระทั่งชนขอบ',color:'#E65C00',cat:'ctrl',
                    params:[], hasBody:true},
  repeat_forever:  {label:'ทำซ้ำตลอด',           color:'#CC2200', cat:'ctrl',
                    params:[], hasBody:true},
  wait:            {label:'หน่วงเวลา',           color:'#FFAB19', cat:'ctrl',
                    params:[{k:'secs',type:'num',val:1,unit:'วิ'}]},

  /* ── ปากกา ── */
  pen_up:          {label:'ยกปากกา',            color:'#59C059', cat:'pen', params:[]},
  pen_down:        {label:'วางปากกา',           color:'#59C059', cat:'pen', params:[]},
  set_color:       {label:'สีปากกา',            color:'#59C059', cat:'pen',
                    params:[{k:'color',type:'color',val:'#4C97FF'}]},
  set_size:        {label:'ขนาดเส้น',           color:'#59C059', cat:'pen',
                    params:[{k:'size',type:'num',val:2,unit:'px'}]},

let _mobTab = 'code';
function switchMobTab(tab){
  _mobTab = tab;
  const isMob = window.innerWidth <= 760;
  if(!isMob) return;
  document.getElementById('tabCode').classList.toggle('active', tab==='code');
  document.getElementById('tabScreen').classList.toggle('active', tab==='screen');
  const ws = document.getElementById('wsPanel');
  const pal = document.getElementById('palette');
  const cv = document.getElementById('cvPanel');
  if(tab === 'code'){
    pal.classList.remove('mob-hidden');
    ws.classList.remove('mob-hidden');
    cv.classList.add('mob-hidden');
  } else {
    pal.classList.add('mob-hidden');
    ws.classList.add('mob-hidden');
    cv.classList.remove('mob-hidden');
    setTimeout(()=>{ setupCanvas(); drawScene(); }, 60);
  }
}

function applyMobLayout(){
  if(window.innerWidth <= 760){
    switchMobTab(_mobTab);
  } else {
    // Desktop: show all
    ['palette','wsPanel','cvPanel'].forEach(id=>{
      document.getElementById(id).classList.remove('mob-hidden');
    });
  }
}

/* ═══════════════════════════════════════════════════════════
   CANVAS SETUP & ZOOM
═══════════════════════════════════════════════════════════ */
function setupCanvas(){
  const wrap = document.getElementById('cvWrap');
  CW = wrap.clientWidth || 310;
  CH = wrap.clientHeight || 250;
  CV.width = CW; CV.height = CH;
  CX = CW/2; CY = CH/2;
}

function doZoom(dir){
  if(dir===0){ zoom=1.0; panX=0; panY=0; }
  else { zoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoom + dir*ZOOM_STEP)); }
  document.getElementById('zoomPct').textContent = Math.round(zoom*100)+'%';
  drawScene();
}

window.addEventListener('resize', ()=>{ applyMobLayout(); setupCanvas(); drawScene(); });

/* mouse wheel */
document.getElementById('cvWrap').addEventListener('wheel', e=>{
  e.preventDefault();
  if(e.ctrlKey || e.metaKey){ doZoom(e.deltaY<0?1:-1); }
  else if(e.shiftKey){ panX-=e.deltaY*0.8; drawScene(); }
  else { panY-=e.deltaY*0.8; drawScene(); }
}, {passive:false});

/* mouse drag to pan */
const _cvWrap = document.getElementById('cvWrap');
_cvWrap.addEventListener('mousedown', e=>{
  _isPanning=true; _panStartX=e.clientX; _panStartY=e.clientY;
  _panStartPX=panX; _panStartPY=panY;
  _cvWrap.classList.add('panning'); e.preventDefault();
});
window.addEventListener('mousemove', e=>{
  if(!_isPanning) return;
  panX=_panStartPX+(e.clientX-_panStartX);
  panY=_panStartPY+(e.clientY-_panStartY);
  drawScene();
});
window.addEventListener('mouseup', ()=>{
  if(!_isPanning) return;
  _isPanning=false; _cvWrap.classList.remove('panning');
});

/* touch drag to pan canvas */
_cvWrap.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    _isPanning=true;
    _panStartX=e.touches[0].clientX; _panStartY=e.touches[0].clientY;
    _panStartPX=panX; _panStartPY=panY;
  }
},{passive:true});
_cvWrap.addEventListener('touchmove', e=>{
  if(!_isPanning||e.touches.length!==1) return;
  panX=_panStartPX+(e.touches[0].clientX-_panStartX);
  panY=_panStartPY+(e.touches[0].clientY-_panStartY);
  drawScene(); e.preventDefault();
},{passive:false});
_cvWrap.addEventListener('touchend', ()=>{ _isPanning=false; });

/* ═══════════════════════════════════════════════════════════
   CANVAS HELPERS
═══════════════════════════════════════════════════════════ */
function canvasRoundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w,y, x+w,y+h, r);
  ctx.arcTo(x+w,y+h, x,y+h, r);
  ctx.arcTo(x,y+h, x,y, r);
  ctx.arcTo(x,y, x+w,y, r);
  ctx.closePath();
}

/* ═══════════════════════════════════════════════════════════
   TURTLE
═══════════════════════════════════════════════════════════ */
function resetTurtle(){
  bgColor = '#111827';
  turtle = {x:CX, y:CY, ang:-90, pen:true, color:'#4C97FF', size:2, _sayText:null};
  trailPts = [{x:CX, y:CY, pen:false, color:'#4C97FF', size:2}];
  stamps = [];
  shapes = [];
}

function drawScene(){
  CTX.clearRect(0,0,CW,CH);
  CTX.save();
  CTX.translate(panX, panY);
  CTX.translate(CX, CY);
  CTX.scale(zoom, zoom);
  CTX.translate(-CX, -CY);

  /* background */
  CTX.fillStyle = bgColor;
  CTX.fillRect(0,0,CW,CH);

  /* grid */
  CTX.strokeStyle = zoom>0.6 ? 'rgba(255,255,255,.05)' : 'rgba(255,255,255,.03)';
  CTX.lineWidth = 1/zoom;
  for(let x=0;x<CW*2;x+=40){CTX.beginPath();CTX.moveTo(x-CW,0);CTX.lineTo(x-CW,CH*2);CTX.stroke();}
  for(let y=0;y<CH*2;y+=40){CTX.beginPath();CTX.moveTo(0,y-CH);CTX.lineTo(CW*2,y-CH);CTX.stroke();}

  /* center cross */
  CTX.strokeStyle='rgba(255,255,255,.12)'; CTX.lineWidth=1/zoom;
  CTX.beginPath();CTX.moveTo(CX-10,CY);CTX.lineTo(CX+10,CY);CTX.stroke();
  CTX.beginPath();CTX.moveTo(CX,CY-10);CTX.lineTo(CX,CY+10);CTX.stroke();

  /* axes */
  CTX.save();
  CTX.setLineDash([4/zoom,3/zoom]);
  CTX.strokeStyle='rgba(255,90,90,.55)'; CTX.lineWidth=1/zoom;
  CTX.beginPath(); CTX.moveTo(0,CY); CTX.lineTo(CW,CY); CTX.stroke();
  CTX.strokeStyle='rgba(80,210,120,.55)';
  CTX.beginPath(); CTX.moveTo(CX,0); CTX.lineTo(CX,CH); CTX.stroke();
  CTX.setLineDash([]);
  const fs=9/zoom;
  CTX.font=`bold ${fs}px Segoe UI`; CTX.textBaseline='middle';
  CTX.fillStyle='rgba(255,110,110,.8)'; CTX.textAlign='right';
  CTX.fillText('X +',CW-2,CY-fs*.8);
  CTX.fillStyle='rgba(80,220,130,.8)'; CTX.textAlign='left';
  CTX.fillText('Y +',CX+3/zoom,fs*.9);
  CTX.fillStyle='rgba(255,255,255,.3)'; CTX.font=`${7.5/zoom}px Segoe UI`;
  CTX.textAlign='left'; CTX.textBaseline='top';
  CTX.fillText('(0,0)',CX+2/zoom,CY+1/zoom);
  CTX.restore();

  /* shapes (circles etc.) */
  for(const s of shapes){
    CTX.beginPath();
    if(s.type==='circle'){
      CTX.strokeStyle=s.color; CTX.lineWidth=s.lw;
      CTX.arc(s.x,s.y,s.r,0,Math.PI*2); CTX.stroke();
    } else if(s.type==='fill_circle'){
      CTX.fillStyle=s.color;
      CTX.arc(s.x,s.y,s.r,0,Math.PI*2); CTX.fill();
    }
  }

  /* stamps */
  for(const s of stamps){
    CTX.beginPath(); CTX.fillStyle=s.color||'#4C97FF';
    CTX.arc(s.x,s.y,7,0,Math.PI*2); CTX.fill();
  }

  /* trail */
  if(trailPts.length>1){
    for(let i=1;i<trailPts.length;i++){
      if(trailPts[i].pen){
        CTX.beginPath();
        CTX.strokeStyle=trailPts[i].color||'#4C97FF';
        CTX.lineWidth=trailPts[i].size||2;
        CTX.lineCap='round';
        CTX.moveTo(trailPts[i-1].x,trailPts[i-1].y);
        CTX.lineTo(trailPts[i].x,trailPts[i].y);
        CTX.stroke();
      }
    }
  }

  /* turtle arrow */
  const r = turtle.ang*Math.PI/180;
  const sz = 11;
  CTX.save();
  CTX.translate(turtle.x,turtle.y); CTX.rotate(r+Math.PI/2);
  CTX.shadowColor='rgba(0,0,0,.4)'; CTX.shadowBlur=4/zoom;
  CTX.beginPath();
  CTX.moveTo(0,-sz);CTX.lineTo(-sz*.55,sz*.6);CTX.lineTo(sz*.55,sz*.6);
  CTX.closePath();
  CTX.fillStyle='#00ff99'; CTX.fill();
  CTX.shadowBlur=0;
  CTX.fillStyle='rgba(0,30,15,.7)';
  CTX.fillRect(-2,-sz+3,2,3); CTX.fillRect(1,-sz+3,2,3);
  CTX.restore();

  CTX.restore(); /* end zoom/pan */

  /* say bubble — drawn in screen-space (fixed size regardless of zoom) */
  if(turtle._sayText){
    const sx = panX + CX + (turtle.x - CX) * zoom;
    const sy = panY + CY + (turtle.y - CY) * zoom;
    const text = turtle._sayText;
    CTX.save();
    CTX.font = 'bold 13px Segoe UI, sans-serif';
    const tw = CTX.measureText(text).width;
    const bw = tw + 18, bh = 28, br = 8;
    const bx = Math.max(4, Math.min(CW-bw-4, sx - bw/2));
    const by = Math.max(4, sy - 55);
    CTX.fillStyle = 'rgba(255,255,255,.96)';
    canvasRoundRect(CTX, bx, by, bw, bh, br); CTX.fill();
    /* bubble tail */
    CTX.beginPath();
    CTX.moveTo(sx-5, by+bh); CTX.lineTo(sx+5, by+bh); CTX.lineTo(sx, by+bh+9);
    CTX.closePath(); CTX.fill();
    /* text */
    CTX.fillStyle='#1a1a2e'; CTX.textAlign='center'; CTX.textBaseline='middle';
    CTX.fillText(text, bx+bw/2, by+bh/2);
    CTX.restore();
  }
}

/* ═══════════════════════════════════════════════════════════
   EXECUTION ENGINE
═══════════════════════════════════════════════════════════ */
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }
function speedMs(){ return Math.max(4,(11-+document.getElementById('speedSlider').value)*14); }

async function execList(blocks, vars){
  for(const b of blocks){ if(stopFlag)return; await execBlock(b,vars); }
}

async function execBlock(b, vars){
  const p = b.params || {};
  function nv(k){ const v=p[k]; return typeof v==='string'&&vars[v]!=null?vars[v]:parseFloat(v)||0; }

  switch(b.type){
    case 'move':          await animMove(nv('dist')); break;
    case 'move_back':     await animMove(-nv('dist')); break;
    case 'turn_right':    turtle.ang+=nv('ang'); await tick(0.3); break;
    case 'turn_left':     turtle.ang-=nv('ang'); await tick(0.3); break;
    case 'set_angle':     turtle.ang=nv('ang');  await tick(0.3); break;
    case 'home': {
      turtle.x=CX; turtle.y=CY;
      trailPts.push({x:CX,y:CY,pen:false,color:turtle.color,size:turtle.size});
      await tick(1); break;
    }
    case 'set_xy': {
      const nx=CX+nv('x'), ny=CY-nv('y');
      trailPts.push({x:nx,y:ny,pen:turtle.pen,color:turtle.color,size:turtle.size});
      turtle.x=nx; turtle.y=ny; await tick(1); break;
    }
    case 'move_to_random': {
      const mg=20;
      const rx=mg+Math.random()*(CW-mg*2), ry=mg+Math.random()*(CH-mg*2);
      trailPts.push({x:rx,y:ry,pen:turtle.pen,color:turtle.color,size:turtle.size});
      turtle.x=rx; turtle.y=ry; await tick(1); break;
    }
    case 'bounce_edge': {
      const mg=5, r2=turtle.ang*Math.PI/180;
      const vx=Math.cos(r2), vy=Math.sin(r2);
      let bounced=false;
      if((turtle.x<=mg&&vx<0)||(turtle.x>=CW-mg&&vx>0)){turtle.ang=180-turtle.ang;bounced=true;}
      if((turtle.y<=mg&&vy<0)||(turtle.y>=CH-mg&&vy>0)){turtle.ang=-turtle.ang;bounced=true;}
      if(bounced){drawScene(); await delay(30);}
      break;
    }
    case 'pen_up':      turtle.pen=false; await tick(0.2); break;
    case 'pen_down':    turtle.pen=true;  await tick(0.2); break;
    case 'set_color':   turtle.color=p.color||'#4C97FF'; break;
    case 'set_size':    turtle.size=nv('size'); break;
    case 'random_color':turtle.color='#'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0'); break;
    case 'clear_screen':
      trailPts=[{x:turtle.x,y:turtle.y,pen:false}]; stamps=[]; shapes=[];
      drawScene(); await tick(0.3); break;
    case 'stamp':
      stamps.push({x:turtle.x,y:turtle.y,color:turtle.color});
      drawScene(); await tick(0.3); break;
    case 'set_bg':
      bgColor=p.color||'#111827'; drawScene(); break;
    case 'draw_circle':
      shapes.push({type:'circle',x:turtle.x,y:turtle.y,r:Math.max(1,nv('radius')),color:turtle.color,lw:turtle.size});
      drawScene(); await tick(1); break;
    case 'fill_circle':
      shapes.push({type:'fill_circle',x:turtle.x,y:turtle.y,r:Math.max(1,nv('radius')),color:turtle.color});
      drawScene(); await tick(1); break;
    case 'say': {
      turtle._sayText = p.text||'สวัสดี!';
      drawScene();
      await delay(Math.min(nv('secs'),5)*1000);
      turtle._sayText = null; drawScene(); break;
    }
    case 'wait':
      await delay(Math.min(nv('secs'),5)*1000*speedMs()/300); break;
    case 'repeat': {
      const n=Math.min(Math.max(0,nv('times')),500);
      for(let i=0;i<n;i++){ if(stopFlag)return; await execList(b.body||[],vars); }
      break;
    }
    case 'repeat_count': {
      const vn=p.var||'i', to=Math.min(Math.max(0,nv('to')),500);
      for(let i=1;i<=to;i++){ if(stopFlag)return; vars[vn]=i; await execList(b.body||[],vars); }
      break;
    }
    case 'repeat_until_edge': {
      const mg2=8; let cnt2=0;
      while(!stopFlag&&cnt2<10000){
        cnt2++;
        const onEdge=turtle.x<=mg2||turtle.x>=CW-mg2||turtle.y<=mg2||turtle.y>=CH-mg2;
        if(onEdge) break;
        await execList(b.body||[],vars);
      }
      break;
    }
    case 'repeat_forever': {
      let cnt3=0;
      while(!stopFlag&&cnt3<50000){ cnt3++; await execList(b.body||[],vars); }
      break;
    }
    case 'set_var':    vars[p.name||'x']=nv('val'); break;
    case 'change_var': { const n=p.name||'x'; vars[n]=(vars[n]||0)+nv('val'); break; }
    case 'move_var':   await animMove(vars[p.name||'x']||0); break;
    case 'turn_var': {
      const v=vars[p.name||'x']||0;
      if(p.dir==='ซ้าย') turtle.ang-=v; else turtle.ang+=v;
      await tick(0.3); break;
    }
  }
}

async function tick(factor){ drawScene(); await delay(speedMs()*factor); }

async function animMove(dist){
  if(dist===0) return;
  const steps=Math.max(1,Math.abs(Math.round(dist)));
  const sign=dist>0?1:-1;
  const r=turtle.ang*Math.PI/180;
  const dx=Math.cos(r)*sign, dy=Math.sin(r)*sign;
  const spd=speedMs();
  const BATCH=Math.max(1,Math.floor(steps/Math.max(3,10-spd/30)));
  let drawn=0;
  for(let i=0;i<steps;i++){
    turtle.x+=dx; turtle.y+=dy;
    trailPts.push({x:turtle.x,y:turtle.y,pen:turtle.pen,color:turtle.color,size:turtle.size});
    if(++drawn>=BATCH){ drawn=0; drawScene(); await delay(spd*0.04); }
  }
  drawScene(); await delay(spd*0.25);
}

/* ═══════════════════════════════════════════════════════════
   SUCCESS HELPERS
═══════════════════════════════════════════════════════════ */
function dist(ax,ay,bx,by){ return Math.sqrt((ax-bx)**2+(ay-by)**2); }
function nearStart(t,thr){ return dist(t.x,t.y,CX,CY)<thr; }
function trailSegs(){
  let n=0,in_=false;
  for(let i=1;i<trailPts.length;i++){
    if(trailPts[i].pen){if(!in_){n++;in_=true;}}else{in_=false;}
  }
  return n;
}
function trailHasGap(){
  let had=false;
  for(const p of trailPts){if(p.pen)had=true;else if(had)return true;}
  return false;
}
function hasAngleDiff(){
  let dirs=[],last=null;
  for(let i=1;i<trailPts.length;i++){
    if(!trailPts[i].pen)continue;
    const dx=trailPts[i].x-trailPts[i-1].x, dy=trailPts[i].y-trailPts[i-1].y;
    if(Math.abs(dx)+Math.abs(dy)<0.5)continue;
    const a=Math.atan2(dy,dx);
    if(last===null||Math.abs(a-last)>0.25){dirs.push(a);last=a;}
  }
  return dirs.length>=2;
}
function wsHasType(bl,type){
  for(const b of bl){if(b.type===type)return true;if(b.body&&wsHasType(b.body,type))return true;}
  return false;
}

═══════════════════════════════════════════════════════════ */
async function runProgram(){
  if(running){stopFlag=true;return;}
  if(!workspaceBlocks.length){setStatus('⚠️ ยังไม่มีบล็อค — เพิ่มบล็อคก่อนแล้วค่อยกดรัน');return;}
  running=true; stopFlag=false;
  document.getElementById('successBar').classList.remove('show');
  document.getElementById('btnRun').textContent='⏹ หยุด';
  bgColor='#111827';
  resetTurtle(); drawScene();
  setStatus('⏳ กำลังรัน...');
  // Auto-switch to screen tab on mobile
  if(window.innerWidth<=760) switchMobTab('screen');
  try{ await execList(workspaceBlocks,{}); }
  catch(e){ setStatus('❌ ข้อผิดพลาด: '+e.message); }
  running=false; stopFlag=false;
  document.getElementById('btnRun').textContent='▶ รัน';
  checkSuccess();
}

function checkSuccess(){
  const ex=EXERCISES[currentEx];
  if(ex.check(turtle,workspaceBlocks)){
    document.getElementById('successBar').classList.add('show');
    setStatus('✅ สำเร็จ! ลองแบบฝึกหัดถัดไป 🎉');

  }
}

function setStatus(m){ document.getElementById('exStatus').textContent=m; }

/* ═══════════════════════════════════════════════════════════
   WORKSPACE BLOCK DATA
═══════════════════════════════════════════════════════════ */
function makeBlock(type){
  const def=DEFS[type]; if(!def)return null;
  const params={};
  for(const p of def.params){ params[p.k]=p.val; }
  const b={id:genId(),type,params};
  if(def.hasBody)b.body=[];
  return b;
}

function addToWS(type){
  const b=makeBlock(type); if(!b)return;
  workspaceBlocks.push(b);
  renderWS();
}

function removeBlock(id,list){
  for(let i=0;i<list.length;i++){
    if(list[i].id===id){list.splice(i,1);return true;}
    if(list[i].body&&removeBlock(id,list[i].body))return true;
  }
  return false;
}

function clearWS(){
  if(running)return;
  workspaceBlocks=[];
  resetTurtle(); drawScene();
  document.getElementById('successBar').classList.remove('show');
  setStatus('พร้อมแล้ว กด ▶ รัน เพื่อเริ่ม');
  renderWS();
}

/* ═══════════════════════════════════════════════════════════
   RENDER WORKSPACE
═══════════════════════════════════════════════════════════ */
function renderWS(){
  const body=document.getElementById('wsBody');
  const empty=document.getElementById('wsEmpty');
  empty.style.display=workspaceBlocks.length?'none':'block';
  while(body.lastChild&&body.lastChild!==empty)body.removeChild(body.lastChild);
  renderBlockList(workspaceBlocks,body);
  setupDnD();
}

function renderBlockList(blocks,container){
  blocks.forEach(b=>{
    const def=DEFS[b.type]; if(!def)return;
    if(b.body!=null){
      const wrap=document.createElement('div');
      wrap.className='repeat-wrap'; wrap.dataset.id=b.id;
      wrap.appendChild(makeBlockEl(b,def));
      const nbody=document.createElement('div');
      nbody.className='repeat-body'; nbody.dataset.repeatId=b.id;
      if(!b.body.length){
        const h=document.createElement('div');
        h.className='repeat-drop-hint'; h.textContent='← ลากบล็อคมาใส่ที่นี่';
        nbody.appendChild(h);
      } else {
        renderBlockList(b.body,nbody);
      }
      wrap.appendChild(nbody);
      const ec=document.createElement('div');
      ec.className='repeat-end'; ec.style.borderLeft='3px solid '+def.color;
      ec.textContent='สิ้นสุด '+def.label;
      wrap.appendChild(ec);
      container.appendChild(wrap);
    } else {
      container.appendChild(makeBlockEl(b,def));
    }
  });
}

function makeBlockEl(b,def){
  const el=document.createElement('div');
  el.className='wb'; el.style.background=def.color;
  el.draggable=true; el.dataset.id=b.id; el.dataset.type=b.type;

  const lbl=document.createElement('span'); lbl.textContent=def.label;
  el.appendChild(lbl);

  for(const p of def.params){
    const np=b.params;
    if(p.type==='num'){
      const inp=document.createElement('input'); inp.type='number'; inp.value=np[p.k];
      inp.style.width=p.k==='times'||p.k==='to'?'40px':'48px';
      inp.addEventListener('change',e=>{np[p.k]=parseFloat(e.target.value)||0;});
      inp.addEventListener('mousedown',e=>e.stopPropagation());
      inp.addEventListener('click',e=>e.stopPropagation());
      inp.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
      el.appendChild(inp);
      if(p.unit){const u=document.createElement('span');u.className='unit-lbl';u.textContent=p.unit;el.appendChild(u);}
    } else if(p.type==='txt'){
      const inp=document.createElement('input'); inp.type='text'; inp.value=np[p.k]||'';
      inp.addEventListener('change',e=>{np[p.k]=e.target.value;});
      inp.addEventListener('mousedown',e=>e.stopPropagation());
      inp.addEventListener('click',e=>e.stopPropagation());
      inp.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
      el.appendChild(inp);
    } else if(p.type==='sentence'){
      const inp=document.createElement('input'); inp.type='text'; inp.value=np[p.k]||'';
      inp.className='wide-txt';
      inp.addEventListener('change',e=>{np[p.k]=e.target.value;});
      inp.addEventListener('mousedown',e=>e.stopPropagation());
      inp.addEventListener('click',e=>e.stopPropagation());
      inp.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
      el.appendChild(inp);
    } else if(p.type==='color'){
      const inp=document.createElement('input'); inp.type='color'; inp.value=np[p.k]||'#4C97FF';
      inp.addEventListener('change',e=>{np[p.k]=e.target.value;});
      inp.addEventListener('mousedown',e=>e.stopPropagation());
      inp.addEventListener('click',e=>e.stopPropagation());
      inp.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
      el.appendChild(inp);
    } else if(p.type==='select'){
      const sel=document.createElement('select');
      sel.className='wb-sel';
      (p.opts||[]).forEach(o=>{const opt=document.createElement('option');opt.value=o;opt.textContent=o;sel.appendChild(opt);});
      sel.value=np[p.k]||p.val;
      sel.addEventListener('change',e=>{np[p.k]=e.target.value;});
      sel.addEventListener('mousedown',e=>e.stopPropagation());
      sel.addEventListener('touchstart',e=>e.stopPropagation(),{passive:true});
      el.appendChild(sel);
    }
    if(p.unit&&p.type!=='num'){const u=document.createElement('span');u.className='unit-lbl';u.textContent=p.unit;el.appendChild(u);}
  }

  const del=document.createElement('button'); del.className='del-btn'; del.textContent='✕';
  del.addEventListener('click',e=>{e.stopPropagation();removeBlock(b.id,workspaceBlocks);renderWS();});
  del.addEventListener('touchstart',e=>{e.stopPropagation();},{passive:true});
  el.appendChild(del);

  /* Touch drag-and-drop */
  addTouchDnD(el);

  return el;
}

/* ═══════════════════════════════════════════════════════════
   TOUCH DRAG-AND-DROP (mobile)
═══════════════════════════════════════════════════════════ */
let _td = null, _tdTimer = null;

function addTouchDnD(el){
  el.addEventListener('touchstart', e=>{
    if(running||e.touches.length!==1) return;
    const id=+el.dataset.id; if(!id) return;
    const touch=e.touches[0];

    clearTimeout(_tdTimer);
    _tdTimer=setTimeout(()=>{
      _tdTimer=null;
      if(navigator.vibrate) navigator.vibrate(28);
      const rect=el.getBoundingClientRect();
      const clone=el.cloneNode(true);
      clone.className='td-ghost';
      clone.style.cssText+=`;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;background:${el.style.background}`;
      document.body.appendChild(clone);
      _td={id,clone,el,startX:touch.clientX,startY:touch.clientY,origLeft:rect.left,origTop:rect.top};
      el.style.opacity='.25';
    },190);
  },{passive:true});

  el.addEventListener('touchmove', e=>{
    if(_tdTimer){clearTimeout(_tdTimer);_tdTimer=null;}
    if(!_td) return;
    const t=e.touches[0];
    _td.clone.style.left=(_td.origLeft+t.clientX-_td.startX)+'px';
    _td.clone.style.top=(_td.origTop+t.clientY-_td.startY)+'px';
    e.preventDefault();
  },{passive:false});

  el.addEventListener('touchend', e=>{
    clearTimeout(_tdTimer); _tdTimer=null;
    if(!_td) return;
    const td=_td; _td=null;
    td.clone.remove(); td.el.style.opacity='';
    const t=e.changedTouches[0];
    _dropTouch(td.id, t.clientX, t.clientY);
  },{passive:false});

  el.addEventListener('touchcancel',()=>{
    clearTimeout(_tdTimer); _tdTimer=null;
    if(_td){_td.clone.remove();_td.el.style.opacity='';_td=null;}
  },{passive:true});
}

function _dropTouch(srcId, cx, cy){
  const over=document.elementFromPoint(cx,cy); if(!over) return;
  const targetWb=over.closest('.wb[data-id]');
  const targetRb=over.closest('.repeat-body[data-repeat-id]');
  if(targetWb&&+targetWb.dataset.id!==srcId){
    const rect=targetWb.getBoundingClientRect();
    const before=cy<rect.top+rect.height/2;
    const src=findAndRemove(srcId,workspaceBlocks);
    if(src){insertNear(src,+targetWb.dataset.id,before,workspaceBlocks);renderWS();}
  } else if(targetRb){
    const rid=+targetRb.dataset.repeatId;
    if(rid!==srcId){
      const src=findAndRemove(srcId,workspaceBlocks);
      const rep=findBlock(rid,workspaceBlocks);
      if(src&&rep?.body){rep.body.push(src);renderWS();}
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   MOUSE DRAG AND DROP
═══════════════════════════════════════════════════════════ */
let dragSrcId=null;

function setupDnD(){
  document.querySelectorAll('.wb[data-id]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      dragSrcId=+el.dataset.id;
      e.dataTransfer.effectAllowed='move';
      setTimeout(()=>el.style.opacity='.35',0);
    });
    el.addEventListener('dragend',()=>{
      el.style.opacity='';
      document.querySelectorAll('.wb.drag-over-top,.wb.drag-over-bot').forEach(x=>{
        x.classList.remove('drag-over-top','drag-over-bot');
      });
    });
    el.addEventListener('dragover',e=>{
      e.preventDefault();
      const mid=el.getBoundingClientRect().top+el.getBoundingClientRect().height/2;
      el.classList.toggle('drag-over-top',e.clientY<mid);
      el.classList.toggle('drag-over-bot',e.clientY>=mid);
    });
    el.addEventListener('dragleave',()=>{
      el.classList.remove('drag-over-top','drag-over-bot');
    });
    el.addEventListener('drop',e=>{
      e.preventDefault();
      if(!dragSrcId)return;
      const tid=+el.dataset.id; if(dragSrcId===tid)return;
      const mid=el.getBoundingClientRect().top+el.getBoundingClientRect().height/2;
      const before=e.clientY<mid;
      const src=findAndRemove(dragSrcId,workspaceBlocks); if(!src)return;
      insertNear(src,tid,before,workspaceBlocks);
      renderWS();
    });
  });

  document.querySelectorAll('.repeat-body').forEach(zone=>{
    zone.addEventListener('dragenter',e=>{e.preventDefault();zone.classList.add('drag-over');});
    zone.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();zone.classList.add('drag-over');});
    zone.addEventListener('dragleave',e=>{
      if(!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over');
    });
    zone.addEventListener('drop',e=>{
      e.preventDefault(); e.stopPropagation();
      zone.classList.remove('drag-over');
      if(!dragSrcId)return;
      const rid=+zone.dataset.repeatId; if(dragSrcId===rid)return;
      const src=findAndRemove(dragSrcId,workspaceBlocks); if(!src)return;
      const rep=findBlock(rid,workspaceBlocks);
      if(rep&&rep.body)rep.body.push(src);
      renderWS();
    });
  });
}

function findBlock(id,list){
  for(const b of list){if(b.id===id)return b;if(b.body){const f=findBlock(id,b.body);if(f)return f;}}
  return null;
}
function findAndRemove(id,list){
  for(let i=0;i<list.length;i++){
    if(list[i].id===id)return list.splice(i,1)[0];
    if(list[i].body){const r=findAndRemove(id,list[i].body);if(r)return r;}
  }
  return null;
}
function insertNear(src,tid,before,list){
  for(let i=0;i<list.length;i++){
    if(list[i].id===tid){list.splice(before?i:i+1,0,src);return true;}
    if(list[i].body&&insertNear(src,tid,before,list[i].body))return true;
  }
  return false;
}

/* ═══════════════════════════════════════════════════════════
   PALETTE
═══════════════════════════════════════════════════════════ */
function renderPalette(available){
  const pal=document.getElementById('palette'); pal.innerHTML='';
  const cats={};
  for(const type of available){
    const d=DEFS[type]; if(!d)continue;
    (cats[d.cat]||(cats[d.cat]=[])).push(type);
  }
  for(const [cat,types] of Object.entries(cats)){
    const t=document.createElement('div'); t.className='pal-title';
    t.textContent=CAT_LABELS[cat]||cat; pal.appendChild(t);
    for(const type of types){
      const d=DEFS[type];
      const btn=document.createElement('button');
      btn.className='blk-btn'; btn.style.background=d.color;
      let subtitle='';
      if(d.hasBody) subtitle='<small>ใส่บล็อคด้านในได้</small>';
      else if(d.params.length){
        const pts=d.params.map(p=>p.type==='num'?(p.val+(p.unit||'')):p.type==='color'?'🎨':p.type==='sentence'?'💬':'').filter(Boolean);
        if(pts.length) subtitle='<small>'+pts.join(' ')+'</small>';
      }
      btn.innerHTML=d.label+subtitle;
      btn.addEventListener('click',()=>addToWS(type));
      pal.appendChild(btn);
    }
  }
}

  setTimeout(()=>document.getElementById('fieldName').focus(),100);
}
function closeSubmitModal(){
  document.getElementById('submitModal').classList.remove('show');
}

function _serializeBlocks(blocks,depth){
  depth=depth||0;
  let out=[];
  for(const b of blocks){
    const def=DEFS[b.type]; if(!def)continue;
    const params=b.params?Object.entries(b.params).map(([k,v])=>k+'='+v).join(', '):'';
    out.push('  '.repeat(depth)+'• '+def.label+(params?' ('+params+')':''));
    if(b.body&&b.body.length) out=out.concat(_serializeBlocks(b.body,depth+1));
  }
  return out;
}

async function doSubmit(){
  const name=document.getElementById('fieldName').value.trim();
  const cls=document.getElementById('fieldClass').value;
  const num=document.getElementById('fieldNum').value.trim();
  if(!name||!num){
    document.getElementById('submitStatus').textContent='⚠️ กรุณากรอกชื่อและเลขที่ให้ครบ';
    return;
  }
  document.getElementById('btnSubmitOk').disabled=true;
  document.getElementById('submitStatus').textContent='⏳ กำลังส่ง...';
  const imgData=document.getElementById('cv').toDataURL('image/jpeg',0.82);
  const blockList=_serializeBlocks(workspaceBlocks,0).join('\n')||'(ไม่มีบล็อค)';
  const ex=EXERCISES[currentEx];
  if(window._doFirebaseSubmit){
    try{
      await window._doFirebaseSubmit({name,cls,num:parseInt(num,10),imgData,blockList,
        exerciseIndex:currentEx+1, exerciseTitle:ex.title});
      document.getElementById('submitStatus').textContent='✅ ส่งงานสำเร็จ!';
      document.getElementById('btnSubmitOk').textContent='✅ ส่งแล้ว';
      setTimeout(closeSubmitModal,1800);
    } catch(err){
      document.getElementById('btnSubmitOk').disabled=false;
      document.getElementById('submitStatus').textContent='❌ เกิดข้อผิดพลาด: '+err.message;
    }
  } else {
    document.getElementById('btnSubmitOk').disabled=false;
    document.getElementById('submitStatus').textContent='❌ Firebase ยังไม่พร้อม กรุณารอสักครู่แล้วลองใหม่';
  }
}

<script type="module">

const auth = getAuth(app);
const db   = getFirestore(app);
signInAnonymously(auth).catch(()=>{});

window._doFirebaseSubmit = async function(data){
  await addDoc(collection(db,'game_submissions'),{
    exercise      : data.exerciseIndex,
    exerciseTitle : data.exerciseTitle,
    name          : data.name,
    class         : data.cls,
    number        : data.num,
    blocks        : data.blockList,
    imageDataUrl  : data.imgData,
    submittedAt   : serverTimestamp()
  });
};
