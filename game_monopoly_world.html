<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>เกมเศรษฐี ท่องโลกมหาสนุก</title>
<meta name="theme-color" content="#111827">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌍%3C/text%3E%3C/svg%3E">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08111f;--bg2:#111827;--panel:rgba(255,255,255,.12);--panel2:rgba(255,255,255,.18);
  --stroke:rgba(255,255,255,.20);--text:#f8fafc;--muted:#aab5c8;--gold:#ffd84d;--orange:#ff9f1c;
  --blue:#38bdf8;--green:#35e38a;--red:#ff6b7a;--shadow:0 22px 70px rgba(0,0,0,.45);
  --c-brown:#9b5b2e;--c-lblue:#60d4ff;--c-pink:#ff77c7;--c-orange:#ffad42;--c-red:#ff5a67;
  --c-yellow:#ffe66d;--c-green:#35e38a;--c-dblue:#3b82f6;--c-rail:#94a3b8;--c-util:#c084fc;
}
html{scroll-behavior:smooth}
body{
  font-family:'Sarabun',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:
  radial-gradient(circle at top left,rgba(56,189,248,.26),transparent 34%),
  radial-gradient(circle at bottom right,rgba(255,216,77,.18),transparent 30%),
  linear-gradient(135deg,#07101f 0%,#111827 50%,#1d1233 100%);
  color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.35
}
body:before{content:'';position:fixed;inset:0;pointer-events:none;background-image:radial-gradient(rgba(255,255,255,.11) 1px, transparent 1px);background-size:22px 22px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.8),transparent 80%)}
.screen{display:none;min-height:100vh;padding:clamp(12px,2.5vw,24px);position:relative;z-index:1}.screen.active{display:flex;flex-direction:column}

/* HOME */
#sc-home{align-items:center;justify-content:center;gap:18px;overflow:hidden}.hero-orb{position:absolute;width:260px;height:260px;border-radius:999px;background:linear-gradient(135deg,rgba(56,189,248,.42),rgba(255,216,77,.22));filter:blur(8px);top:8%;right:8%;opacity:.45;animation:floaty 6s ease-in-out infinite alternate}.logo{text-align:center;margin-bottom:6px}.globe{font-size:clamp(4.5rem,14vw,7.2rem);animation:spin 9s linear infinite, bob 2.8s ease-in-out infinite;display:inline-block;filter:drop-shadow(0 14px 24px rgba(0,0,0,.4))}.logo h1{font-size:clamp(2.1rem,7vw,4rem);line-height:1.0;color:var(--gold);text-shadow:0 0 24px rgba(255,216,77,.48);font-weight:900;letter-spacing:-.02em}.logo p{color:#dbeafe;font-size:clamp(1rem,3vw,1.25rem);font-weight:700;margin-top:8px}.tagline{display:inline-flex;align-items:center;gap:6px;margin-top:12px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#e0f2fe;font-size:.9rem;box-shadow:0 10px 30px rgba(0,0,0,.18)}
@keyframes spin{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}@keyframes bob{50%{translate:0 -8px}}@keyframes floaty{to{transform:translate3d(-25px,25px,0) scale(1.07)}}
.home-card{background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.10));border:1px solid rgba(255,255,255,.22);border-radius:28px;padding:20px;width:100%;max-width:430px;box-shadow:var(--shadow);backdrop-filter:blur(16px)}.card-title{display:flex;align-items:center;gap:10px;font-weight:900;margin-bottom:12px;color:#fff;font-size:1.05rem}.card-title span{width:34px;height:34px;display:grid;place-items:center;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--orange));box-shadow:0 8px 22px rgba(255,159,28,.24)}.inp,.code-inp{width:100%;padding:14px 16px;border-radius:16px;border:1px solid rgba(255,255,255,.22);background:rgba(3,7,18,.38);color:#fff;font-size:1em;margin-bottom:10px;font-family:'Sarabun',sans-serif;box-shadow:inset 0 1px 0 rgba(255,255,255,.08);transition:.2s}.inp::placeholder,.code-inp::placeholder{color:#91a1b8}.inp:focus,.code-inp:focus{outline:none;border-color:var(--gold);background:rgba(3,7,18,.55);box-shadow:0 0 0 4px rgba(255,216,77,.14)}.code-inp{border:2px solid rgba(255,216,77,.72);color:var(--gold);font-size:1.65em;font-weight:900;letter-spacing:.22em;text-align:center}.code-inp::placeholder{font-size:.55em;letter-spacing:0}.home-features{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.home-feature{padding:9px 8px;border-radius:16px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);text-align:center;color:#dbeafe;font-size:.78rem}.home-feature b{display:block;color:#fff;font-size:1.1rem}.hint{color:#93a4bd;font-size:.82rem;text-align:center;margin-top:12px}

/* BUTTONS */
.btn,.action-btn,.center-btn{font-family:'Sarabun',sans-serif;border:none;cursor:pointer;font-weight:900;transition:transform .15s ease,filter .2s ease,box-shadow .2s ease}.btn{display:block;width:100%;padding:14px 16px;border-radius:18px;font-size:1.02em;margin-bottom:9px;box-shadow:0 12px 26px rgba(0,0,0,.22)}.btn:hover,.action-btn:hover,.center-btn:hover{filter:brightness(1.08);transform:translateY(-1px)}.btn:active,.action-btn:active,.center-btn:active{transform:scale(.97)}.btn-gold{background:linear-gradient(135deg,var(--gold),var(--orange));color:#23150a}.btn-blue{background:linear-gradient(135deg,#38bdf8,#2563eb);color:#fff}.btn-green{background:linear-gradient(135deg,#35e38a,#0e9f6e);color:#052e1b}.btn-red{background:linear-gradient(135deg,#fb7185,#dc2626);color:#fff}.btn-gray{background:rgba(255,255,255,.11);color:#e5e7eb;border:1px solid rgba(255,255,255,.18);box-shadow:none}.btn-sm{padding:8px 14px;border-radius:12px;font-size:.85em;width:auto;display:inline-block;margin:3px}.btn:disabled,.center-btn:disabled,.action-btn:disabled{opacity:.42;cursor:not-allowed;filter:grayscale(.3);transform:none}

/* LOBBY */
#sc-lobby{background:transparent;max-width:720px;margin:0 auto;width:100%;justify-content:center}.lobby-header{background:linear-gradient(180deg,rgba(255,255,255,.16),rgba(255,255,255,.08));border:1px solid rgba(255,255,255,.18);border-radius:26px;padding:18px;margin-bottom:14px;text-align:center;box-shadow:var(--shadow);backdrop-filter:blur(14px)}.room-code{font-size:clamp(2.6rem,10vw,4.2rem);font-weight:900;letter-spacing:.16em;color:var(--gold);text-shadow:0 0 20px rgba(255,216,77,.35)}.player-list{display:grid;gap:10px;margin-bottom:16px}.player-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:13px;display:flex;align-items:center;gap:12px;box-shadow:0 12px 26px rgba(0,0,0,.16)}.player-avatar{width:48px;height:48px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:1.55em;flex-shrink:0;box-shadow:inset 0 1px 0 rgba(255,255,255,.38),0 8px 18px rgba(0,0,0,.2)}.player-ready-badge{margin-left:auto;font-size:.8em;padding:6px 10px;border-radius:999px;font-weight:900}.ready-yes{background:rgba(53,227,138,.16);color:#7cffb5;border:1px solid rgba(53,227,138,.54)}.ready-no{background:rgba(255,107,122,.14);color:#ff9aa7;border:1px solid rgba(255,107,122,.5)}

/* BOARD SCREEN */
#sc-game{background:transparent;padding:0;min-height:100vh}.game-top{position:sticky;top:0;z-index:20;padding:10px;background:rgba(8,17,31,.82);border-bottom:1px solid rgba(255,255,255,.12);backdrop-filter:blur(16px)}.players-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}.players-strip::-webkit-scrollbar{display:none}.pstrip{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:8px 12px;text-align:center;min-width:96px;font-size:.8em;white-space:nowrap;box-shadow:0 8px 18px rgba(0,0,0,.15)}.pstrip.active-turn{border-color:var(--gold);background:rgba(255,216,77,.16);box-shadow:0 0 0 3px rgba(255,216,77,.12)}.pstrip.bankrupt{opacity:.4;text-decoration:line-through}.pstrip .pmoney{font-weight:900;color:#7cffb5;font-size:.92em}.board-wrap{position:relative;padding:10px}.board{display:grid;grid-template-columns:1.85fr repeat(9,1fr) 1.85fr;grid-template-rows:1.85fr repeat(9,1fr) 1.85fr;gap:3px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.2);border-radius:22px;aspect-ratio:1;max-width:min(100vw - 20px, 620px);margin:0 auto;padding:4px;box-shadow:var(--shadow)}.sq{background:linear-gradient(180deg,rgba(30,41,59,.98),rgba(15,23,42,.98));position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;overflow:hidden;cursor:pointer;border-radius:9px;min-width:0;border:1px solid rgba(255,255,255,.05);transition:.18s}.sq:hover{background:linear-gradient(180deg,rgba(51,65,85,.98),rgba(15,23,42,.98));transform:translateY(-1px);z-index:2}.sq-name{font-size:clamp(.42rem,1.25vw,.72rem);text-align:center;line-height:1.05;color:#e7edf7;padding:1px;font-weight:800}.sq-price{font-size:clamp(.36rem,1vw,.6rem);color:var(--gold);font-weight:900}.sq-color{height:6px;width:100%;border-radius:999px;flex-shrink:0;box-shadow:0 0 10px currentColor}.sq-icon{font-size:clamp(.8rem,2.2vw,1.4rem);filter:drop-shadow(0 3px 5px rgba(0,0,0,.3))}.sq.corner{background:linear-gradient(135deg,rgba(255,216,77,.18),rgba(56,189,248,.12)),#111827}.sq-tokens{display:flex;flex-wrap:wrap;gap:2px;position:absolute;bottom:3px;left:3px;right:3px;justify-content:center}.token{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.88);flex-shrink:0;box-shadow:0 2px 5px rgba(0,0,0,.45)}.sq-owned-bar{position:absolute;top:0;left:0;right:0;height:5px;box-shadow:0 2px 8px rgba(0,0,0,.25)}.sq-level{position:absolute;top:6px;right:3px;font-size:.56em;color:var(--gold);filter:drop-shadow(0 2px 3px #000)}.board-center{grid-column:2/11;grid-row:2/11;background:radial-gradient(circle at top,rgba(56,189,248,.18),transparent 42%),linear-gradient(135deg,rgba(15,23,42,.96),rgba(30,41,59,.98));display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:20px;padding:12px;gap:10px;border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}.center-title{font-size:clamp(.85rem,2.4vw,1.25rem);color:var(--gold);font-weight:900;letter-spacing:.02em;text-align:center;text-shadow:0 0 18px rgba(255,216,77,.28)}.dice-wrap{display:flex;gap:10px}.die,.dice-popup-die{background:linear-gradient(180deg,#fff,#e2e8f0);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#0f172a;font-weight:900;box-shadow:0 10px 22px rgba(0,0,0,.35),inset 0 2px 0 #fff}.die{width:46px;height:46px;font-size:1.7em}.die.rolling,.dice-popup-die.rolling{animation:droll .45s ease-out}@keyframes droll{0%{transform:rotate(0) scale(1)}25%{transform:rotate(18deg) scale(1.08)}75%{transform:rotate(-18deg) scale(1.08)}100%{transform:rotate(0) scale(1)}}.center-btn{background:linear-gradient(135deg,var(--gold),var(--orange));color:#1c1205;border-radius:16px;padding:10px 22px;font-size:.9em;box-shadow:0 14px 28px rgba(255,159,28,.22)}.center-info{font-size:.72em;color:#cbd5e1;text-align:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);padding:6px 10px;border-radius:999px}

/* INFO PANEL */
.info-panel{background:rgba(8,17,31,.92);border-top:1px solid rgba(255,216,77,.35);padding:12px;min-height:124px;backdrop-filter:blur(14px)}.info-country{display:flex;gap:12px;max-width:760px;margin:0 auto}.info-flag{font-size:3em;flex-shrink:0;width:64px;height:64px;display:grid;place-items:center;border-radius:22px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16)}.info-text h3{color:var(--gold);font-size:1.12em;margin-bottom:4px}.info-row{font-size:.86em;color:#b9c5d6;margin-bottom:3px}.info-row span{color:#fff;font-weight:700}.info-action{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}.action-btn{padding:9px 16px;border-radius:14px;font-size:.88em}.buy-btn{background:linear-gradient(135deg,var(--gold),var(--orange));color:#1c1205}.skip-btn{background:rgba(255,255,255,.12);color:#eee;border:1px solid rgba(255,255,255,.20)}.game-log{padding:10px 12px;max-height:136px;overflow-y:auto;background:rgba(3,7,18,.72);border-top:1px solid rgba(255,255,255,.10)}.log-entry{max-width:760px;margin:0 auto;font-size:.8em;color:#b7c3d4;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.06)}.log-entry.highlight{color:var(--gold)}.log-entry.bad{color:#ff9aa7}.log-entry.good{color:#7cffb5}

/* GAMEOVER */
#sc-gameover{align-items:center;justify-content:center;padding:20px}.winner-card{background:linear-gradient(135deg,rgba(30,41,59,.96),rgba(88,28,135,.88));border:2px solid rgba(255,216,77,.82);border-radius:30px;padding:28px;text-align:center;width:100%;max-width:420px;box-shadow:var(--shadow)}.winner-crown{font-size:4.6em;margin-bottom:8px;filter:drop-shadow(0 10px 18px rgba(0,0,0,.35))}.winner-name{font-size:2em;font-weight:900;color:var(--gold)}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(9px)}.overlay.active{display:flex}.modal{background:linear-gradient(180deg,rgba(30,41,59,.98),rgba(15,23,42,.98));border:1px solid rgba(255,255,255,.22);border-radius:28px;padding:22px;width:100%;max-width:380px;box-shadow:var(--shadow)}.modal h3{color:var(--gold);margin-bottom:12px;font-size:1.18em}.dice-popup-die{width:68px;height:68px;font-size:2.55em}#diceOverlay .modal{background:radial-gradient(circle at top,rgba(255,216,77,.16),transparent 45%),linear-gradient(135deg,rgba(30,41,59,.98),rgba(14,52,96,.96));border:2px solid rgba(255,216,77,.48);text-align:center;padding:30px 24px}.chance-modal{background:radial-gradient(circle at top,rgba(255,216,77,.18),transparent 46%),linear-gradient(135deg,rgba(30,41,59,.98),rgba(88,28,135,.92));text-align:center}.chance-icon{font-size:3.5em;margin-bottom:8px}.chance-text{color:var(--gold);font-size:1.1em;font-weight:900}.chance-desc{color:#cbd5e1;font-size:.92em;margin-top:7px}.loading{text-align:center;padding:40px 20px;color:#aaa}.loading .spin{font-size:2em;animation:rot 1s linear infinite;display:block;margin-bottom:10px}@keyframes rot{to{transform:rotate(360deg)}}
@media (max-width:520px){.board{gap:2px;border-radius:16px;padding:3px}.sq{border-radius:6px}.sq-name{font-size:.38rem}.sq-price{font-size:.34rem}.sq-icon{font-size:.8rem}.die{width:38px;height:38px;font-size:1.35em}.center-title{font-size:.78rem}.center-btn{padding:8px 14px;font-size:.78em}.home-features{grid-template-columns:1fr 1fr}.info-country{align-items:flex-start}.info-flag{font-size:2.25em;width:54px;height:54px;border-radius:18px}.info-row{font-size:.78em}.token{width:10px;height:10px}.sq-color{height:5px}}
</style>
</head>
<body>

<!-- HOME -->
<div id="sc-home" class="screen active">
  <div class="hero-orb"></div>
  <div class="logo">
    <div class="globe">🌍</div>
    <h1>เกมเศรษฐี</h1>
    <p>ท่องโลกมหาสนุก 🗺️</p>
    <div class="tagline">✨ ซื้อเมือง • ทอยเต๋า • เรียนรู้วัฒนธรรมรอบโลก</div>
  </div>
  <div class="home-card">
    <div class="card-title"><span>🎮</span>เริ่มการผจญภัย</div>
    <input class="inp" id="playerName" placeholder="ใส่ชื่อผู้เล่น เช่น ครูโอม" maxlength="12">
    <button class="btn btn-gold" onclick="G.createRoom()">🏠 สร้างห้องใหม่</button>
    <div style="display:flex;align-items:center;gap:10px;margin:12px 0;color:#91a1b8;font-size:.82rem"><div style="height:1px;background:rgba(255,255,255,.16);flex:1"></div>หรือเข้าห้องเพื่อน<div style="height:1px;background:rgba(255,255,255,.16);flex:1"></div></div>
    <input class="code-inp" id="joinCode" placeholder="รหัสห้อง 4 ตัว" maxlength="4" style="margin-bottom:10px" oninput="this.value=this.value.toUpperCase()">
    <button class="btn btn-blue" onclick="G.joinRoom()">🚀 เข้าห้องด้วยรหัส</button>
    <button class="btn btn-gray" onclick="G.joinRandom()" style="margin-top:4px">🎲 สุ่มเข้าห้องสาธารณะ</button>
    <div class="home-features">
      <div class="home-feature"><b>2–4</b>ผู้เล่น</div>
      <div class="home-feature"><b>40</b>ช่องทั่วโลก</div>
      <div class="home-feature"><b>🌐</b>ออนไลน์</div>
    </div>
  </div>
  <div class="hint">แนะนำ: เปิดบนมือถือแนวนอนหรือแท็บเล็ตจะเห็นกระดานชัดที่สุด</div>
</div>

<!-- LOBBY -->
<div id="sc-lobby" class="screen">
  <div class="lobby-header">
    <div style="font-size:.8em;color:#aaa">รหัสห้อง</div>
    <div class="room-code" id="lbCode">----</div>
    <div id="lbStatus" style="font-size:.8em;color:#aaa"></div>
  </div>
  <div class="player-list" id="lbPlayers"></div>
  <div id="lbHost" style="display:none">
    <button class="btn btn-gold" id="startBtn" onclick="G.startGame()" disabled>▶ เริ่มเกม (ต้องการ 2–4 คน)</button>
  </div>
  <div id="lbGuest" style="display:none">
    <button class="btn btn-green" id="readyBtn" onclick="G.toggleReady()">✅ พร้อมแล้ว</button>
  </div>
  <button class="btn btn-gray" onclick="G.leaveRoom()" style="margin-top:8px">🚪 ออกจากห้อง</button>
</div>

<!-- GAME -->
<div id="sc-game" class="screen">
  <div class="game-top">
    <div class="players-strip" id="gPlayers"></div>
  </div>
  <div class="board-wrap">
    <div class="board" id="gameBoard"></div>
  </div>
  <div class="info-panel" id="infoPanel">
    <div style="color:#555;font-size:.85em;text-align:center;padding:20px 0">เดินหมากเพื่อสำรวจโลก 🌍</div>
  </div>
  <div class="game-log" id="gameLog"></div>
</div>

<!-- GAMEOVER -->
<div id="sc-gameover" class="screen">
  <div class="winner-card">
    <div class="winner-crown">👑</div>
    <div id="goWinner" class="winner-name"></div>
    <div id="goMoney" style="color:#4cff91;font-size:1.1em;margin:8px 0"></div>
    <div id="goRanking" style="font-size:.85em;color:#aaa;margin-top:10px"></div>
    <button class="btn btn-gold" onclick="G.backHome()" style="margin-top:20px">🏠 กลับหน้าหลัก</button>
  </div>
</div>

<!-- CHANCE OVERLAY -->
<div class="overlay" id="chanceOverlay">
  <div class="modal chance-modal">
    <div class="chance-icon" id="chIcon">🎴</div>
    <div class="chance-text" id="chTitle"></div>
    <div class="chance-desc" id="chDesc"></div>
    <button class="btn btn-gold" style="margin-top:16px" onclick="G.closeChance()">ตกลง</button>
  </div>
</div>

<!-- PROPERTY DETAIL OVERLAY -->
<div class="overlay" id="propOverlay">
  <div class="modal">
    <div id="propDetail"></div>
    <button class="btn btn-gray" style="margin-top:12px" onclick="G.closeProp()">ปิด</button>
  </div>
</div>

<!-- DICE TURN OVERLAY -->
<div class="overlay" id="diceOverlay">
  <div class="modal">
    <div style="font-size:1.1em;font-weight:700;color:#ffd700;margin-bottom:4px" id="diceWhose">🎲 ถึงตาของคุณแล้ว!</div>
    <div style="color:#aaa;font-size:.85em;margin-bottom:20px">ทอยลูกเต๋าเพื่อเดินหมาก</div>
    <div class="dice-wrap" style="justify-content:center;gap:16px;margin-bottom:24px">
      <div class="dice-popup-die" id="pd1">?</div>
      <div class="dice-popup-die" id="pd2">?</div>
    </div>
    <button class="btn btn-gold" id="popRollBtn" onclick="G.rollDice()" style="max-width:200px;margin:0 auto">🎲 ทอยลูกเต๋า</button>
    <div id="popRollInfo" style="color:#aaa;font-size:.8em;margin-top:10px"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, get, update, onValue, off, remove, onDisconnect }

// Board grid positions: index → [row, col] in 11×11 grid (0-indexed)
// Bottom row: i=0→(10,0), i=1→(10,1)...i=10→(10,10)
// Right col: i=11→(9,10)...i=19→(1,10), i=20→(0,10)
// Top row: i=21→(0,9)...i=29→(0,1), i=30→(0,0)
// Left col: i=31→(1,0)...i=39→(9,0)
function sqPos(i) {
  if(i<=10)    return [10, i];
  if(i<=20)    return [10-(i-10), 10];
  if(i<=30)    return [0, 10-(i-20)];
  return [i-30, 0];
}

// ── BUILD BOARD ──
function buildBoard(){
  const board=$('gameBoard');
  board.innerHTML='';
  // Create 11×11 cells
  const cells=[];
  for(let r=0;r<11;r++){
    for(let c=0;c<11;c++){
      const cell=document.createElement('div');
      cell.style.cssText=`grid-row:${r+1};grid-column:${c+1}`;
      cell.className='sq';
      cells.push({r,c,el:cell});
      board.appendChild(cell);
    }
  }
  // Center
  const center=document.createElement('div');
  center.className='board-center';
  center.style.cssText=`grid-row:2/11;grid-column:2/11;`;
  center.innerHTML=`
    <div class="center-title">🌍 WORLD TOUR<br>เกมเศรษฐีท่องโลก</div>
    <div class="dice-wrap"><div class="die" id="d1">?</div><div class="die" id="d2">?</div></div>
    <button class="center-btn" id="rollBtn" onclick="G.rollDice()" disabled>🎲 ทอยลูกเต๋า</button>
    <div class="center-info" id="turnInfo">รอเริ่มเกม...</div>
  `;
  board.appendChild(center);
  // Fill perimeter squares
  SQUARES.forEach(sq=>{
    const [r,c]=sqPos(sq.i);
    const cellEl=cells.find(x=>x.r===r&&x.c===c)?.el;
    if(!cellEl) return;
    cellEl.id=`sq${sq.i}`;
    cellEl.dataset.sq=sq.i;
    cellEl.onclick=()=>G.tapSquare(sq.i);
    if(sq.type==='go'||sq.type==='jail'||sq.type==='parking'||sq.type==='gotojail'){
      cellEl.classList.add('corner');
    }
    let html='';
    if(sq.type==='prop'){
      html+=`<div class="sq-color" style="background:${GROUP_COLOR[sq.group]}"></div>`;
      html+=`<div class="sq-icon">${sq.flag}</div>`;
      html+=`<div class="sq-name">${sq.name}</div>`;
      html+=`<div class="sq-price">฿${sq.price}</div>`;
    } else if(sq.type==='airport'||sq.type==='utility'){
      html+=`<div class="sq-icon">${sq.icon}</div>`;
      html+=`<div class="sq-name">${sq.name.replace('สนามบินนานาชาติ ','✈️')}</div>`;
    } else {
      html+=`<div class="sq-icon">${sq.icon||''}</div>`;
      html+=`<div class="sq-name">${sq.name}</div>`;
    }
    html+=`<div class="sq-owned-bar" id="ob${sq.i}"></div>`;
    html+=`<div class="sq-level" id="sl${sq.i}"></div>`;
    html+=`<div class="sq-tokens" id="st${sq.i}"></div>`;
    cellEl.innerHTML=html;
  });
}

// ── RENDER GAME STATE ──
function renderState(room){
  if(!room) return;
  const players=room.players||{};
  const board=room.board||{};
  const pids=Object.keys(players);
  // Players strip
  const strip=$('gPlayers');
  strip.innerHTML='';
  pids.forEach((pid,idx)=>{
    const p=players[pid];
    const div=document.createElement('div');
    div.className='pstrip'+(room.currentPlayer===pid?' active-turn':'')+(p.bankrupt?' bankrupt':'');
    div.innerHTML=`<div>${PLAYER_TOKENS[idx]||'👤'} <b>${p.name}</b></div><div class="pmoney">฿${p.money??1500}</div>${p.jailTurns?'<div style="color:#ff6b6b;font-size:.7em">⛓️คุก</div>':''}`;
    strip.appendChild(div);
  });
  // Board tokens & ownership
  SQUARES.forEach(sq=>{
    // tokens
    const tEl=$(`st${sq.i}`);
    if(tEl){
      tEl.innerHTML='';
      pids.forEach((pid,idx)=>{
        const p=players[pid];
        if(p.position===sq.i&&!p.bankrupt){
          const t=document.createElement('div');
          t.className='token';
          t.style.background=PLAYER_COLORS[idx]||'#fff';
          tEl.appendChild(t);
        }
      });
    }
    // ownership
    const obEl=$(`ob${sq.i}`);
    const slEl=$(`sl${sq.i}`);
    if(obEl){
      const bsq=board[sq.i];
      if(bsq?.owner){
        const ownerIdx=pids.indexOf(bsq.owner);
        obEl.style.background=PLAYER_COLORS[ownerIdx]||'#fff';
        if(slEl) slEl.textContent=bsq.level>0?('⭐'.repeat(Math.min(bsq.level,4))+(bsq.level>=5?'🏨':'')):'';
      } else {
        obEl.style.background='';
        if(slEl) slEl.textContent='';
      }
    }
  });
  // My turn
  myTurn = room.currentPlayer===myId && !players[myId]?.bankrupt;
  const rb=$('rollBtn');
  const ti=$('turnInfo');
  if(rb){
    rb.disabled=!myTurn||room.phase!=='playing'||room.waitingAction;
  }
  if(ti){
    if(room.phase==='playing'){
      const cp=players[room.currentPlayer];
      ti.textContent=room.currentPlayer===myId?'ตาของคุณ!':'ตาของ '+( cp?.name||'?');
    }
  }
  // Dice popup — แสดงเมื่อถึงตา ซ่อนเมื่อไม่ใช่ตาหรือกำลังรอ action
  const dov=$('diceOverlay');
  if(dov){
    const shouldShow = myTurn && room.phase==='playing' && !room.waitingAction;
    if(shouldShow){
      dov.classList.add('active');
      const pw=$('diceWhose'); if(pw) pw.textContent='🎲 ถึงตาของคุณแล้ว!';
      const prb=$('popRollBtn'); if(prb) prb.disabled=false;
      const pri=$('popRollInfo'); if(pri) pri.textContent='';
    } else {
      dov.classList.remove('active');
    }
  }
  // Info panel if on action
  if(room.waitingAction && room.currentPlayer===myId){
    showActionPanel(room);
  }
}

    const owner=bsq?.owner;
    if(!owner){
      const canAfford=(players[myId]?.money||0)>=sq.price;
      html=`<div class="info-country">

          <h3>${sq.name} ${sq.flag||''}</h3>

function isMonopoly(room, sqIdx){
  const sq=SQUARES[sqIdx];
  if(sq.type!=='prop') return false;
  const group=sq.group;
  const groupSquares=SQUARES.filter(s=>s.type==='prop'&&s.group===group);
  const board=room.board||{};
  return groupSquares.every(s=>(board[s.i]?.owner||'')===(board[sqIdx]?.owner||''));
}

async function rollDice(){
  if(!myTurn||!roomCode) return;
  const rb=$('rollBtn'); if(rb) rb.disabled=true;
  const prb=$('popRollBtn'); if(prb) prb.disabled=true;
  // Animate both board center dice and popup dice
  const d1=$('d1'), d2=$('d2'), pd1=$('pd1'), pd2=$('pd2');
  [d1,d2,pd1,pd2].forEach(d=>d&&d.classList.add('rolling'));
  await new Promise(r=>setTimeout(r,400));
  const r1=Math.ceil(Math.random()*6), r2=Math.ceil(Math.random()*6);
  const faces=['','⚀','⚁','⚂','⚃','⚄','⚅'];
  [d1,d2,pd1,pd2].forEach(d=>d&&d.classList.remove('rolling'));
  if(d1) d1.textContent=faces[r1]; if(d2) d2.textContent=faces[r2];
  if(pd1) pd1.textContent=faces[r1]; if(pd2) pd2.textContent=faces[r2];
  // แสดงผลรวมในป๊อปอัพ แล้วปิดหลัง 1 วินาที
  const pri=$('popRollInfo');
  if(pri) pri.textContent=`ได้ ${r1}+${r2} = ${r1+r2} 🎯`;
  setTimeout(()=>{ const dov=$('diceOverlay'); if(dov) dov.classList.remove('active'); },900);
  const snap=await get(ref(db,`mw_rooms/${roomCode}`));
  const room=snap.val()||{};
  const players=room.players||{};
  const me=players[myId]||{};
  let newPos=me.position??0;
  let money=me.money??1500;
  let jailTurns=me.jailTurns||0;
  let goToJail=false;
  const doublesCount=(me.doublesCount||0);
  const isDouble=r1===r2;
  // Jail check
  if(jailTurns>0){
    if(isDouble){ jailTurns=0; log('🔓 ทอยคู่! หลุดจากคุก','good'); }
    else if(jailTurns>=3){ money-=50; jailTurns=0; log('💸 จ่ายค่าประกัน 50 บาทออกจากคุก','bad'); }
    else { jailTurns++; log(`⛓️ ติดคุกอีก (${jailTurns}/3 รอบ)`,'bad');
      await update(ref(db),{
        [`mw_rooms/${roomCode}/players/${myId}/jailTurns`]:jailTurns,
        [`mw_rooms/${roomCode}/players/${myId}/money`]:money,
        [`mw_rooms/${roomCode}/dice`]:[r1,r2],
      });
      await endTurn(room, isDouble&&doublesCount<2);
      return;
    }
  }
  // Three doubles = jail
  const newDoubles=isDouble?doublesCount+1:0;
  if(newDoubles>=3){ goToJail=true; }
  // Move
  const prevPos=newPos;
  newPos=(newPos+r1+r2)%40;
  // Passed GO?
  if(!goToJail && newPos<prevPos && prevPos+r1+r2>=40){
    money+=200; log('🏁 ผ่านจุดเริ่มต้น! รับ ฿200','good');
  }
  if(goToJail){ newPos=10; jailTurns=1; log('👮 ทอยคู่ 3 ครั้งติด! ไปคุก','bad'); }
  log(`🎲 ${me.name||myName} ทอย ${r1}+${r2}=${r1+r2} → ช่องที่ ${newPos} (${SQUARES[newPos]?.name})`);
  const sq=SQUARES[newPos];
  let waitingAction=false;
  let updates={
    [`mw_rooms/${roomCode}/players/${myId}/position`]:newPos,
    [`mw_rooms/${roomCode}/players/${myId}/money`]:money,
    [`mw_rooms/${roomCode}/players/${myId}/jailTurns`]:jailTurns,
    [`mw_rooms/${roomCode}/players/${myId}/doublesCount`]:newDoubles,
    [`mw_rooms/${roomCode}/dice`]:[r1,r2],
  };
  // Handle square
  if(sq.type==='gotojail'){ updates[`mw_rooms/${roomCode}/players/${myId}/position`]=10; updates[`mw_rooms/${roomCode}/players/${myId}/jailTurns`]=1; log('👮 ไปคุก!','bad'); }
  else if(sq.type==='go'){ updates[`mw_rooms/${roomCode}/players/${myId}/money`]=(money+200); log('🏁 ลงที่จุดเริ่มต้น รับ ฿200 เพิ่ม','good'); }
  else if(sq.type==='tax'){ updates[`mw_rooms/${roomCode}/players/${myId}/money`]=(money-sq.amount); log(`💸 เสียภาษี ฿${sq.amount}`,'bad'); }
  else if(sq.type==='chance'||sq.type==='community'){
    const deck=sq.type==='chance'?CHANCE:COMMUNITY;
    const card=deck[Math.floor(Math.random()*deck.length)];
    const eff=card.fn(me);
    let cardMoney=money;
    if(eff.money) cardMoney+=eff.money;
    if(eff.move!==undefined){ updates[`mw_rooms/${roomCode}/players/${myId}/position`]=eff.move; }
    if(eff.jail){ updates[`mw_rooms/${roomCode}/players/${myId}/position`]=10; updates[`mw_rooms/${roomCode}/players/${myId}/jailTurns`]=1; }
    if(eff.birthday){
      const pids=Object.keys(players);
      pids.forEach(pid=>{ if(pid!==myId){ const u={}; u[`mw_rooms/${roomCode}/players/${pid}/money`]=(players[pid].money||1500)-eff.birthday; update(ref(db),u); } });
      cardMoney+=eff.birthday*(pids.length-1);
    }
    updates[`mw_rooms/${roomCode}/players/${myId}/money`]=Math.max(0,cardMoney);
    // Show card
    showChance(card.icon,card.t,card.desc||card.d);
    log(`🎴 ${card.t}`,'highlight');
  }
  else if(sq.type==='prop'||sq.type==='airport'||sq.type==='utility'){
    const bsq=(room.board||{})[newPos];
    if(bsq?.owner && bsq.owner!==myId && !players[bsq.owner]?.bankrupt){
      const owner=players[bsq.owner];
      let rent=calcRent(sq,bsq,room,[r1,r2]);
      const myMoney=money-rent;
      updates[`mw_rooms/${roomCode}/players/${myId}/money`]=myMoney;
      updates[`mw_rooms/${roomCode}/players/${bsq.owner}/money`]=(owner.money||0)+rent;
      log(`💸 จ่ายค่าเช่า ฿${rent} ให้ ${owner.name}`,'bad');
      if(myMoney<=0){ updates[`mw_rooms/${roomCode}/players/${myId}/bankrupt`]=true; log(`💀 ${me.name||myName} ล้มละลาย!`,'bad'); }
    } else if(!bsq?.owner){
      waitingAction=true;
      showLandInfo(sq);
    } else if(bsq?.owner===myId){
      waitingAction=true;
    }
  }
  if(waitingAction){ updates[`mw_rooms/${roomCode}/waitingAction`]=true; }
  await update(ref(db),updates);
  if(!waitingAction){ await endTurn(room, isDouble&&!goToJail&&newDoubles<3); }
}

function calcRent(sq, bsq, room, dice){
  if(sq.type==='airport'){
    const count=Object.values(room.board||{}).filter(b=>b?.owner===bsq.owner&&SQUARES[Object.keys(room.board||{}).find(k=>room.board[k]===b)]?.type==='airport').length;
    // Count airports owned
    let n=0; Object.entries(room.board||{}).forEach(([k,v])=>{ if(v?.owner===bsq.owner&&SQUARES[+k]?.type==='airport') n++; });
    return AIRPORT_RENT[n]||25;
  }
  if(sq.type==='utility'){
    let n=0; Object.entries(room.board||{}).forEach(([k,v])=>{ if(v?.owner===bsq.owner&&SQUARES[+k]?.type==='utility') n++; });
    const diceSum=dice[0]+dice[1];
    return n>=2?diceSum*10:diceSum*4;
  }
  const level=bsq?.level||0;
  if(level===0){
    // Check monopoly for double base rent
    if(isMonopoly(room, sq.i)) return sq.rent[0]*2;
    return sq.rent[0];
  }
  return sq.rent[Math.min(level,5)]||sq.rent[sq.rent.length-1];
}

async function endTurn(room, playAgain=false){
  if(playAgain){
    await update(ref(db),{
      [`mw_rooms/${roomCode}/waitingAction`]:false,
    });
    return; // same player rolls again
  }
  const players=room.players||{};
  // Check win: only one non-bankrupt player
  const alive=Object.entries(players).filter(([,p])=>!p.bankrupt);
  if(alive.length<=1){
    const winner=alive[0];
    await update(ref(db),{
      [`mw_rooms/${roomCode}/phase`]:'gameover',
      [`mw_rooms/${roomCode}/winner`]:winner?.[0]||'',
    });
    return;
  }
  // Next player
  const pids=Object.keys(players);
  const cur=pids.indexOf(room.currentPlayer);
  let next=(cur+1)%pids.length;
  while(players[pids[next]]?.bankrupt) next=(next+1)%pids.length;
  await update(ref(db),{
    [`mw_rooms/${roomCode}/currentPlayer`]:pids[next],
    [`mw_rooms/${roomCode}/waitingAction`]:false,
  });
}

async function createRoom(){
  const name=$('playerName').value.trim();
  if(!name){ alert('กรุณาใส่ชื่อก่อน'); return; }
  myName=name; myId=crypto.randomUUID(); isHost=true;
  const code=Math.random().toString(36).slice(2,6).toUpperCase();
  roomCode=code;
  try{
    await withTO(set(ref(db,`mw_rooms/${roomCode}`),{
      phase:'lobby', isPublic:false, createdAt:Date.now()
    }));
    await withTO(set(ref(db,`mw_rooms/${roomCode}/players/${myId}`),{
      name:myName, money:1500, position:0, ready:true, bankrupt:false, jailTurns:0
    }));
    onDisconnect(ref(db,`mw_rooms/${roomCode}/players/${myId}`)).remove();
    enterLobby();
  }catch(e){ alert('เชื่อมต่อ Firebase ไม่ได้: '+e.message); roomCode=''; isHost=false; }
}

async function joinRoom(){

    if(cnt>=4){ alert('ห้องเต็มแล้ว (สูงสุด 4 คน)'); roomCode=''; return; }
    await withTO(set(ref(db,`mw_rooms/${roomCode}/players/${myId}`),{

    }));

    enterLobby();
  }catch(e){ alert('เข้าห้องไม่ได้: '+e.message); roomCode=''; isHost=false; }

function enterLobby(){
  killListeners();
  $('lbCode').textContent=roomCode;
  show('sc-lobby');
  $('lbHost').style.display=isHost?'block':'none';
  $('lbGuest').style.display=isHost?'none':'block';
  // Listen
  const rRef=ref(db,`mw_rooms/${roomCode}`);
  const unsub=onValue(rRef,snap=>{
    const room=snap.val();
    if(!room) return backHome();
    if(room.phase==='playing'){ killListeners(); enterGame(); return; }
    // Render lobby
    const players=room.players||{};
    const pids=Object.keys(players);
    $('lbStatus').textContent=`ผู้เล่น ${pids.length}/4 คน`;
    $('lbPlayers').innerHTML='';
    pids.forEach((pid,idx)=>{
      const p=players[pid];
      const div=document.createElement('div');
      div.className='player-card';
      div.innerHTML=`<div class="player-avatar" style="background:${PLAYER_COLORS[idx]}">${PLAYER_TOKENS[idx]}</div>
        <div><b>${p.name}</b>${pid===myId?' (คุณ)':''}</div>
        <div class="player-ready-badge ${p.ready?'ready-yes':'ready-no'}">${p.ready?'พร้อม':'รอ'}</div>`;
      $('lbPlayers').appendChild(div);
    });
    if(isHost){
      const allReady=pids.every(pid=>players[pid].ready);
      const btn=$('startBtn');
      btn.disabled=pids.length<2||!allReady;
      btn.textContent=pids.length<2?'▶ รอผู้เล่น (ต้องการ 2–4 คน)':!allReady?'▶ รอทุกคนพร้อม':'▶ เริ่มเกม!';
    }
  });
  listeners.lobby=()=>off(rRef,'value',unsub);
}

async function toggleReady(){
  if(!roomCode) return;
  const snap=await get(ref(db,`mw_rooms/${roomCode}/players/${myId}/ready`));
  const cur=snap.val()||false;
  await set(ref(db,`mw_rooms/${roomCode}/players/${myId}/ready`),!cur);
  $('readyBtn').textContent=!cur?'❌ ยกเลิกพร้อม':'✅ พร้อมแล้ว';
}

async function startGame(){
  if(!isHost||!roomCode) return;
  const snap=await get(ref(db,`mw_rooms/${roomCode}/players`));
  const players=snap.val()||{};
  const pids=Object.keys(players);
  if(pids.length<2){ alert('ต้องการอย่างน้อย 2 คน'); return; }
  // Shuffle turn order → first player
  const shuffled=[...pids].sort(()=>Math.random()-.5);
  await update(ref(db),{
    [`mw_rooms/${roomCode}/phase`]:'playing',
    [`mw_rooms/${roomCode}/currentPlayer`]:shuffled[0],
    [`mw_rooms/${roomCode}/board`]:{},
    [`mw_rooms/${roomCode}/round`]:1,
    [`mw_rooms/${roomCode}/waitingAction`]:false,
  });
}

function enterGame(){
  buildBoard();
  show('sc-game');
  const rRef=ref(db,`mw_rooms/${roomCode}`);
  const unsub=onValue(rRef,snap=>{
    const room=snap.val();
    if(!room) return backHome();
    if(room.phase==='gameover'){
      killListeners();
      enterGameOver(room);
      return;
    }
    renderState(room);
  });
  listeners.game=()=>off(rRef,'value',unsub);
}

function enterGameOver(room){
  const players=room.players||{};
  const winnerId=room.winner;
  const winner=players[winnerId];
  const pids=Object.keys(players);
  $('goWinner').textContent=winner?.name||'ไม่มีผู้ชนะ';
  $('goMoney').textContent=winner?`เงินคงเหลือ ฿${winner.money}`:'';
  const rank=pids.sort((a,b)=>(players[b].money||0)-(players[a].money||0));
  $('goRanking').innerHTML='<b>อันดับ:</b><br>'+rank.map((pid,i)=>`${i+1}. ${players[pid].name} — ฿${players[pid].money}`).join('<br>');
  show('sc-gameover');
}

async function leaveRoom(){
  killListeners();
  if(roomCode){
    await remove(ref(db,`mw_rooms/${roomCode}/players/${myId}`)).catch(()=>{});
    if(isHost){
      await remove(ref(db,`mw_rooms/${roomCode}`)).catch(()=>{});
    }
  }
  roomCode=''; isHost=false; isReady=false;
  backHome();
}

function backHome(){ killListeners(); roomCode=''; isHost=false; show('sc-home'); }

// ── EXPOSE ──
window.G={
  createRoom, joinRoom, joinRandom,
  toggleReady, startGame, leaveRoom, backHome,
  rollDice, buyProp, upgradeProp, skipAction,
  tapSquare,
  closeProp(){ $('propOverlay').classList.remove('active'); },
  closeChance(){ $('chanceOverlay').classList.remove('active'); if(myTurn&&roomCode) {} },
};
</script>
