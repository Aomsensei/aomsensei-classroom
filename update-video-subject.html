<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>อัพเดทวิชาวิดีโอ</title>
<style>
  body{font-family:'Sarabun',sans-serif;background:#1a1a2e;color:#fff;display:flex;
    align-items:center;justify-content:center;min-height:100vh;margin:0;padding:20px;box-sizing:border-box;}
  .box{background:#16213e;border-radius:16px;padding:32px;max-width:520px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.4);}
  h2{color:#f39800;margin:0 0 8px;font-size:20px;}
  p{color:#aaa;font-size:13px;margin:0 0 20px;line-height:1.7;}
  .info{background:#0f3460;border-radius:10px;padding:14px;margin-bottom:20px;font-size:13px;line-height:1.8;}
  .info b{color:#ffab19;}
  input{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #334;
    background:#0f1b35;color:#fff;font-family:inherit;font-size:14px;box-sizing:border-box;margin-bottom:14px;}
  button{width:100%;padding:13px;background:#f39800;color:#fff;border:none;border-radius:10px;
    font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;}
  button:hover{background:#e08800;}
  button:disabled{background:#555;cursor:not-allowed;}
  #log{margin-top:18px;background:#0a0a1a;border-radius:8px;padding:14px;
    font-size:12px;line-height:1.9;max-height:220px;overflow-y:auto;display:none;}
  .ok{color:#7dff7d;} .err{color:#ff7d7d;} .info-txt{color:#aaa;}
</style>
</head>
<body>
<div class="box">
  <h2>🎬 อัพเดทวิชาวิดีโอทั้งหมด</h2>
  <p>เครื่องมือนี้จะอัพเดทวิดีโอ <b>ทุกรายการ</b> ใน Firestore ที่ยังไม่มีวิชา ให้เป็น "สังคมศึกษา ศาสนา และวัฒนธรรม"</p>

  <div class="info">
    <b>📌 ผลที่จะเกิดขึ้น:</b><br>
    • วิดีโอที่มีวิชาอยู่แล้ว → ไม่เปลี่ยน<br>
    • วิดีโอที่ยังไม่มีวิชา → ตั้งเป็น <b>"สังคมศึกษา ศาสนา และวัฒนธรรม"</b>
  </div>

  <input type="email" id="email" placeholder="อีเมลครู (admin)" />
  <input type="password" id="pwd" placeholder="รหัสผ่านครู" />
  <button id="btn" onclick="runUpdate()">🚀 อัพเดทเลย</button>
  <div id="log"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { FIREBASE_CONFIG } from "./js/config.js";

const app = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db = getFirestore(app);
const TARGET_SUBJECT = 'สังคมศึกษา ศาสนา และวัฒนธรรม';

function log(msg, cls='info-txt'){
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

window.runUpdate = async function(){
  const email = document.getElementById('email').value.trim();
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('btn');
  if(!email||!pwd){ alert('กรุณากรอกอีเมลและรหัสผ่าน'); return; }

  btn.disabled = true;
  btn.textContent = '⏳ กำลังดำเนินการ...';
  document.getElementById('log').innerHTML = '';

  try{
    log('🔐 กำลัง login...');
    await signInWithEmailAndPassword(auth, email, pwd);
    log('✅ Login สำเร็จ', 'ok');

    log('📥 กำลังโหลดวิดีโอทั้งหมด...');
    const snap = await getDocs(collection(db, 'videos'));
    log(`📊 พบวิดีโอทั้งหมด ${snap.size} รายการ`);

    let updated = 0, skipped = 0;
    for(const d of snap.docs){
      const v = d.data();
      if(v.subject && v.subject.trim()){
        log(`⏭️ ข้าม: "${v.title}" (มีวิชา: ${v.subject})`, 'info-txt');
        skipped++;
      } else {
        await updateDoc(doc(db,'videos',d.id), { subject: TARGET_SUBJECT });
        log(`✅ อัพเดท: "${v.title||d.id}" → ${TARGET_SUBJECT}`, 'ok');
        updated++;
      }
    }

    log(`<br>🎉 เสร็จสิ้น! อัพเดท ${updated} รายการ / ข้าม ${skipped} รายการ`, 'ok');
    btn.textContent = `✅ เสร็จแล้ว (อัพเดท ${updated} รายการ)`;
  }catch(e){
    log(`❌ Error: ${e.message}`, 'err');
    btn.disabled = false;
    btn.textContent = '🚀 ลองใหม่';
  }
};
</script>
</body>
</html>
