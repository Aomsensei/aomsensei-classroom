<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎡 วงล้อสุ่มชื่อ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:    #0f0f1a;
      --panel: rgba(255,255,255,0.06);
      --border:rgba(255,255,255,0.12);
      --gold:  #FFD166;
      --green: #06D6A0;
      --red:   #FF6B6B;
      --blue:  #3A86FF;
      --purple:#8338EC;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: radial-gradient(ellipse at top, #1a1040 0%, #0f0f1a 70%);
      min-height: 100vh;
      color: #fff;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 18px 20px 14px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: clamp(22px, 5vw, 34px);
      font-weight: 800;
      background: linear-gradient(90deg, #FFD166 0%, #FF6B6B 50%, #06D6A0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    header p {
      font-size: 13px;
      opacity: 0.5;
      margin-top: 3px;
    }

    /* ===== LAYOUT ===== */
    .layout {
      display: flex;
      gap: 20px;
      padding: 20px;
      max-width: 1080px;
      margin: 0 auto;
      align-items: flex-start;
    }

    /* ===== WHEEL SECTION ===== */
    .wheel-section {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .wheel-wrap {
      position: relative;
      display: inline-block;
      filter: drop-shadow(0 12px 40px rgba(131,56,236,0.35));
    }

    #wheelCanvas {
      display: block;
      width: min(100%, 500px);
      height: auto;
    }

    #spinBtn {
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 15px 52px;
      font-size: 21px;
      font-weight: 800;
      font-family: 'Sarabun', sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(255,107,107,0.45), 0 2px 0 rgba(0,0,0,0.2);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 1px;
      user-select: none;
    }
    #spinBtn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 32px rgba(255,107,107,0.55);
    }
    #spinBtn:active:not(:disabled) { transform: translateY(-1px); }
    #spinBtn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .entry-count {
      font-size: 13px;
      opacity: 0.5;
      text-align: center;
    }

    /* ===== CONTROLS ===== */
    .controls-section {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,209,102,0.18);
      border: 1px solid rgba(255,209,102,0.35);
      border-radius: 20px;
      padding: 2px 11px;
      font-size: 12px;
      color: var(--gold);
      font-weight: 700;
    }

    textarea#namesInput {
      width: 100%;
      height: 200px;
      background: rgba(0,0,0,0.35);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: #fff;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      line-height: 1.9;
      padding: 10px 13px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea#namesInput:focus { border-color: rgba(131,56,236,0.7); }
    textarea#namesInput::placeholder { color: rgba(255,255,255,0.25); }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 9px 18px;
      border-radius: 9px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-green  { background: var(--green); color: #0f1a14; }
    .btn-green:hover { background: #04c491; }
    .btn-red    { background: rgba(255,107,107,0.18); color: var(--red); border: 1px solid rgba(255,107,107,0.35); }
    .btn-red:hover { background: rgba(255,107,107,0.28); }
    .btn-ghost  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); border: 1px solid var(--border); }
    .btn-ghost:hover { background: rgba(255,255,255,0.14); }
    .btn-blue   { background: var(--blue); color: #fff; }
    .btn-blue:hover { background: #2573e0; }

    .opt-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 14px;
      opacity: 0.75;
    }
    .opt-row input[type=checkbox] {
      width: 16px; height: 16px; cursor: pointer;
      accent-color: var(--green);
    }
    .opt-row label { cursor: pointer; }

    /* Results list */
    #historyList {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 220px;
      overflow-y: auto;
    }
    #historyList::-webkit-scrollbar { width: 4px; }
    #historyList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    #historyList li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      font-size: 14px;
      border-left: 3px solid transparent;
      transition: background 0.2s;
    }
    #historyList li:first-child { border-left-color: var(--gold); background: rgba(255,209,102,0.06); }
    .h-num  { font-size: 11px; opacity: 0.4; min-width: 22px; }
    .h-name { flex: 1; font-weight: 600; }
    .h-time { font-size: 11px; opacity: 0.35; }

    /* ===== MODAL ===== */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.hidden { display: none; }

    .modal-bg {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
    }

    .modal-box {
      position: relative;
      background: linear-gradient(145deg, #1a1040, #0f0f1a);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 36px 32px 28px;
      text-align: center;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
      animation: modalPop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.3) forwards;
    }
    @keyframes modalPop {
      from { transform: scale(0.6) translateY(20px); opacity: 0; }
      to   { transform: scale(1) translateY(0);       opacity: 1; }
    }

    .confetti-layer {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      overflow: hidden;
      pointer-events: none;
    }

    .confetti-dot {
      position: absolute;
      top: -12px;
      border-radius: 2px;
      animation: fallDown linear forwards;
    }
    @keyframes fallDown {
      to { transform: translateY(420px) rotate(720deg); opacity: 0; }
    }

    .win-icon  { font-size: 60px; margin-bottom: 10px; animation: iconBounce 0.5s ease; }
    @keyframes iconBounce {
      0%,100% { transform: scale(1); }
      40% { transform: scale(1.3) rotate(-8deg); }
      70% { transform: scale(0.95) rotate(4deg); }
    }

    .win-label {
      font-size: 15px;
      font-weight: 600;
      opacity: 0.6;
      margin-bottom: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .win-name {
      font-size: clamp(24px, 6vw, 38px);
      font-weight: 800;
      background: linear-gradient(90deg, #FFD166, #FF6B6B, #FF8E53);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 28px;
      word-break: break-word;
      line-height: 1.2;
    }

    .modal-btns {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .modal-btns .btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 700px) {
      .layout { flex-direction: column; align-items: center; padding: 14px; gap: 16px; }
      .wheel-section { width: 100%; }
      #wheelCanvas { width: 100%; max-width: 360px; }
      #spinBtn { width: 100%; max-width: 360px; }
    }
  </style>
</head>
<body>

<header>
  <h1>🎡 วงล้อสุ่มชื่อ</h1>
  <p>Wheel of Names · สุ่มผู้โชคดีอย่างยุติธรรม</p>
</header>

<div class="layout">

  <!-- ===== WHEEL ===== -->
  <div class="wheel-section">
    <div class="wheel-wrap">
      <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>
    <button id="spinBtn" onclick="spin()">🎯 หมุนวงล้อ!</button>
    <div class="entry-count" id="entryCount">0 รายชื่อ</div>
  </div>

  <!-- ===== CONTROLS ===== -->
  <div class="controls-section">

    <!-- Input panel -->
    <div class="panel">
      <div class="panel-title">
        📝 รายชื่อผู้เข้าร่วม
        <span class="badge" id="nameBadge">0 คน</span>
      </div>
      <textarea id="namesInput"
        placeholder="พิมพ์ชื่อ หนึ่งชื่อต่อบรรทัด&#10;&#10;ตัวอย่าง:&#10;ด.ช. สมชาย&#10;ด.ญ. สมหญิง&#10;นักเรียน ก"></textarea>
      <div class="btn-row">
        <button class="btn btn-green" onclick="updateWheel()">✅ อัพเดทวงล้อ</button>
        <button class="btn btn-ghost" onclick="loadSample()">📋 ตัวอย่าง</button>
        <button class="btn btn-red" onclick="clearAll()">🗑️ ล้าง</button>
      </div>
      <div class="opt-row">
        <input type="checkbox" id="chkRemove" checked />
        <label for="chkRemove">นำชื่อผู้ชนะออกจากวงล้อหลังสุ่ม</label>
      </div>
    </div>

    <!-- History panel -->
    <div class="panel" id="historyPanel" style="display:none">
      <div class="panel-title">
        🏆 ประวัติการสุ่ม
        <span class="badge" id="historyBadge">0 ครั้ง</span>
      </div>
      <ul id="historyList"></ul>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn btn-red" style="font-size:13px;padding:7px 14px" onclick="clearHistory()">🗑️ ล้างประวัติ</button>
      </div>
    </div>

  </div>
</div>

<!-- ===== WINNER MODAL ===== -->
<div class="modal hidden" id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-box">
    <div class="confetti-layer" id="confettiLayer"></div>
    <div class="win-icon">🎉</div>
    <div class="win-label">ผู้โชคดีคือ</div>
    <div class="win-name" id="modalWinnerName">—</div>
    <div class="modal-btns">
      <button class="btn btn-blue" onclick="removeAndClose()">✅ นำออกจากวงล้อ &amp; ปิด</button>
      <button class="btn btn-green" onclick="removeAndSpin()">🔄 นำออก &amp; หมุนต่อ</button>
      <button class="btn btn-ghost" onclick="closeModal()">❌ ปิด (เก็บชื่อไว้)</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ──────────────────────────────────────────────
//  COLOUR PALETTE  (15 vivid colours)
// ──────────────────────────────────────────────
const PALETTE = [
  '#FF6B6B','#FF8E53','#FFD166','#ADFF2F','#06D6A0',
  '#4CC9F0','#3A86FF','#8338EC','#FF006E','#F72585',
  '#E63946','#2EC4B6','#E76F51','#7209B7','#4CAF50'
];

// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
let entries    = [];        // current name list
let rotation   = 0;        // total rotation in radians (ever-growing)
let spinning   = false;
let winnerIdx  = -1;        // index in entries[] of current winner
let history    = [];        // [{name, time}]
let audioCtx   = null;
let lastTickSeg = -1;
let rafId      = null;

// ──────────────────────────────────────────────
//  CANVAS
// ──────────────────────────────────────────────
const canvas = document.getElementById('wheelCanvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2;
const OUTER_R  = Math.min(CX, CY) - 18;   // wheel outer radius
const INNER_HUB = 30;                       // hub radius

// ──────────────────────────────────────────────
//  CRYPTO RANDOM
// ──────────────────────────────────────────────
function cryptoRand() {
  const a = new Uint32Array(1);
  crypto.getRandomValues(a);
  return a[0] / (0xFFFFFFFF + 1);  // [0, 1)
}
function cryptoRandInt(n) {
  const a = new Uint32Array(1);
  crypto.getRandomValues(a);
  return a[0] % n;
}

// ──────────────────────────────────────────────
//  DRAW WHEEL
// ──────────────────────────────────────────────
function drawWheel() {
  ctx.clearRect(0, 0, W, H);

  const n = entries.length;

  // Outer decorative ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, OUTER_R + 14, 0, 2 * Math.PI);
  const ringGrad = ctx.createRadialGradient(CX, CY, OUTER_R, CX, CY, OUTER_R + 14);
  ringGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
  ringGrad.addColorStop(1, 'rgba(255,255,255,0.02)');
  ctx.fillStyle = ringGrad;
  ctx.fill();
  ctx.restore();

  if (n === 0) {
    // Empty placeholder
    ctx.save();
    ctx.beginPath();
    ctx.arc(CX, CY, OUTER_R, 0, 2 * Math.PI);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '500 16px Sarabun, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ใส่ชื่อแล้วกด "อัพเดทวงล้อ"', CX, CY);
    ctx.textBaseline = 'alphabetic';
    drawPointer();
    return;
  }

  const segAngle = (2 * Math.PI) / n;

  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(rotation);

  // ── Segments ──
  for (let i = 0; i < n; i++) {
    const start = -Math.PI / 2 + i * segAngle;
    const end   = start + segAngle;
    const mid   = start + segAngle / 2;
    const color = PALETTE[i % PALETTE.length];

    // Fill
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, OUTER_R, start, end);
    ctx.closePath();

    // Subtle gradient on each segment
    const gx1 = Math.cos(mid) * OUTER_R * 0.35;
    const gy1 = Math.sin(mid) * OUTER_R * 0.35;
    const gx2 = Math.cos(mid) * OUTER_R;
    const gy2 = Math.sin(mid) * OUTER_R;
    const seg = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
    seg.addColorStop(0, lighten(color, 30));
    seg.addColorStop(1, color);
    ctx.fillStyle = seg;
    ctx.fill();

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // ── Label ──
    ctx.save();
    ctx.rotate(mid);
    const fs = Math.min(18, Math.max(9, Math.floor(380 / n)));
    ctx.font = `bold ${fs}px 'Sarabun', sans-serif`;
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor  = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur   = 5;

    const maxW = OUTER_R * 0.72;
    let txt = entries[i];
    while (ctx.measureText(txt).width > maxW && txt.length > 1) {
      txt = txt.slice(0, -1);
    }
    if (txt !== entries[i]) txt += '…';
    ctx.fillText(txt, OUTER_R - 14, 0);
    ctx.restore();
  }

  // ── Outer border ──
  ctx.beginPath();
  ctx.arc(0, 0, OUTER_R, 0, 2 * Math.PI);
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 5;
  ctx.stroke();

  // ── Tick marks ──
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + i * segAngle;
    ctx.save();
    ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(OUTER_R - 1, 0);
    ctx.lineTo(OUTER_R + 10, 0);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.restore();
  }

  // ── Hub ──
  const hubGrad = ctx.createRadialGradient(-6, -6, 2, 0, 0, INNER_HUB);
  hubGrad.addColorStop(0, '#ffffff');
  hubGrad.addColorStop(0.6, '#e0e0e0');
  hubGrad.addColorStop(1, '#bdbdbd');
  ctx.beginPath();
  ctx.arc(0, 0, INNER_HUB, 0, 2 * Math.PI);
  ctx.fillStyle = hubGrad;
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur  = 8;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.8)';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Pin
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, 2 * Math.PI);
  ctx.fillStyle = '#757575';
  ctx.shadowBlur = 0;
  ctx.fill();
  // Shine
  ctx.beginPath();
  ctx.arc(-3, -3, 4, 0, 2 * Math.PI);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();

  ctx.restore();

  drawPointer();
}

// Draw the fixed golden pointer (outside rotation)
function drawPointer() {
  const tipY = CY - OUTER_R - 2;
  const pw = 18, ph = 38;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur  = 8;

  // Triangle
  ctx.beginPath();
  ctx.moveTo(CX,       tipY);
  ctx.lineTo(CX - pw,  tipY - ph);
  ctx.lineTo(CX + pw,  tipY - ph);
  ctx.closePath();

  const pGrad = ctx.createLinearGradient(CX - pw, tipY - ph, CX + pw, tipY);
  pGrad.addColorStop(0, '#FFE082');
  pGrad.addColorStop(1, '#FFB300');
  ctx.fillStyle = pGrad;
  ctx.fill();
  ctx.strokeStyle = '#E65100';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();
}

// Lighten a hex colour by `amount` (0-255)
function lighten(hex, amount) {
  const r = Math.min(255, parseInt(hex.slice(1,3), 16) + amount);
  const g = Math.min(255, parseInt(hex.slice(3,5), 16) + amount);
  const b = Math.min(255, parseInt(hex.slice(5,7), 16) + amount);
  return `rgb(${r},${g},${b})`;
}

// ──────────────────────────────────────────────
//  WINNER DETECTION
// ──────────────────────────────────────────────
function currentSegIndex() {
  const n = entries.length;
  if (n === 0) return -1;
  const segAngle = (2 * Math.PI) / n;
  const norm = ((-rotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(norm / segAngle) % n;
}

// ──────────────────────────────────────────────
//  SPIN
// ──────────────────────────────────────────────
function spin() {
  if (spinning) return;

  // Lazily init AudioContext on first user gesture
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
  }

  const n = entries.length;
  if (n === 0) { alert('⚠️ กรุณาใส่ชื่อผู้เข้าร่วมก่อน'); return; }

  if (n === 1) {
    winnerIdx = 0;
    setTimeout(() => showWinner(0), 100);
    return;
  }

  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  lastTickSeg = currentSegIndex();

  // Pick winner using cryptographically secure random
  const picked = cryptoRandInt(n);
  winnerIdx = picked;

  // Calculate exact target rotation so `picked` lands under pointer
  const segAngle = (2 * Math.PI) / n;
  // Segment `picked` centre in un-rotated frame: -π/2 + (picked + 0.5) * segAngle
  // We want its screen angle = -π/2 (pointer), so:
  //   -π/2 + (picked + 0.5) * segAngle + targetR = -π/2  (mod 2π)
  //   targetR = -(picked + 0.5) * segAngle  (mod 2π)
  const idealModAngle = (( -(picked + 0.5) * segAngle ) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);

  // How far we still need to turn from current rotation (mod 2π)
  const currentMod = ((rotation) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  let delta = idealModAngle - currentMod;
  if (delta < 0) delta += 2 * Math.PI;
  if (delta < 0.3) delta += 2 * Math.PI; // ensure at least a tiny spin

  // Add random extra full rotations (5–10)
  const extraSpins = 5 + Math.floor(cryptoRand() * 6);
  // Small random jitter within ±35% of segment so pointer doesn't always hit dead-centre
  const jitter = (cryptoRand() - 0.5) * segAngle * 0.7;

  const targetRotation = rotation + extraSpins * 2 * Math.PI + delta + jitter;

  // Spin duration 4.5–7 s
  const duration = 4500 + cryptoRand() * 2500;
  const t0       = performance.now();
  const r0       = rotation;

  function frame(now) {
    const elapsed = now - t0;
    const prog    = Math.min(elapsed / duration, 1);
    const eased   = easeOutQuart(prog);
    rotation      = r0 + (targetRotation - r0) * eased;

    // Tick sound when passing a segment boundary
    const seg = currentSegIndex();
    if (seg !== lastTickSeg) {
      tickSound(1 - prog);   // faster early → higher pitch
      lastTickSeg = seg;
    }

    drawWheel();

    if (prog < 1) {
      rafId = requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      showWinner(winnerIdx);
    }
  }

  rafId = requestAnimationFrame(frame);
}

function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }

// ──────────────────────────────────────────────
//  AUDIO
// ──────────────────────────────────────────────
function tickSound(speed) {    // speed ≈ 0 (slow) … 1 (fast)
  if (!audioCtx) return;
  try {
    const osc  = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 300 + speed * 700;
    osc.type = 'triangle';
    const t = audioCtx.currentTime;
    gain.gain.setValueAtTime(0.07, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.055);
    osc.start(t);
    osc.stop(t + 0.055);
  } catch (_) {}
}

function fanfareSound() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) { return; }
  }
  const melody = [523, 659, 784, 1047, 1319];
  melody.forEach((freq, i) => {
    try {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      const t = audioCtx.currentTime + i * 0.11;
      gain.gain.setValueAtTime(0.14, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t);
      osc.stop(t + 0.35);
    } catch (_) {}
  });
}

// ──────────────────────────────────────────────
//  WINNER MODAL
// ──────────────────────────────────────────────
function showWinner(idx) {
  winnerIdx = idx;
  const name = entries[idx];

  // Add to history
  history.unshift({ name, time: new Date() });
  renderHistory();

  // Play fanfare
  fanfareSound();

  // Populate & show modal
  document.getElementById('modalWinnerName').textContent = name;
  document.getElementById('modal').classList.remove('hidden');
  spawnConfetti();
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
}

function removeAndClose() {
  removeWinner();
  closeModal();
}

function removeAndSpin() {
  removeWinner();
  closeModal();
  setTimeout(spin, 350);
}

function removeWinner() {
  if (winnerIdx < 0 || winnerIdx >= entries.length) return;
  entries.splice(winnerIdx, 1);
  document.getElementById('namesInput').value = entries.join('\n');
  winnerIdx = -1;
  updateCountBadge();
  drawWheel();
}

// ──────────────────────────────────────────────
//  CONFETTI
// ──────────────────────────────────────────────
function spawnConfetti() {
  const layer  = document.getElementById('confettiLayer');
  layer.innerHTML = '';
  const colors = ['#FFD166','#FF6B6B','#06D6A0','#3A86FF','#8338EC','#FF006E','#4CC9F0','#ADFF2F'];
  const shapes = ['50%', '0%', '0% 50%'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-dot';
    const size = 6 + Math.random() * 9;
    el.style.cssText = `
      left:${Math.random() * 100}%;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      width:${size}px;
      height:${size}px;
      border-radius:${shapes[Math.floor(Math.random() * shapes.length)]};
      animation-duration:${1.4 + Math.random() * 1.4}s;
      animation-delay:${Math.random() * 0.4}s;
    `;
    layer.appendChild(el);
  }
}

// ──────────────────────────────────────────────
//  HISTORY
// ──────────────────────────────────────────────
function renderHistory() {
  const panel = document.getElementById('historyPanel');
  const list  = document.getElementById('historyList');
  const badge = document.getElementById('historyBadge');
  panel.style.display = 'block';
  badge.textContent = history.length + ' ครั้ง';
  list.innerHTML = '';
  history.forEach((h, idx) => {
    const li  = document.createElement('li');
    const hh  = h.time.getHours().toString().padStart(2,'0');
    const mm  = h.time.getMinutes().toString().padStart(2,'0');
    li.innerHTML = `
      <span class="h-num">#${history.length - idx}</span>
      <span class="h-name">${h.name}</span>
      <span class="h-time">${hh}:${mm}</span>`;
    list.appendChild(li);
  });
}

function clearHistory() {
  history = [];
  document.getElementById('historyList').innerHTML = '';
  document.getElementById('historyPanel').style.display = 'none';
}

// ──────────────────────────────────────────────
//  NAME MANAGEMENT
// ──────────────────────────────────────────────
function updateWheel() {
  entries = document.getElementById('namesInput').value
    .split('\n')
    .map(s => s.trim())
    .filter(s => s.length > 0);
  updateCountBadge();
  drawWheel();
}

function clearAll() {
  if (!confirm('ล้างรายชื่อทั้งหมด?')) return;
  document.getElementById('namesInput').value = '';
  entries = [];
  rotation = 0;
  updateCountBadge();
  drawWheel();
}

function loadSample() {
  const sample = [
    'นักเรียน ก','นักเรียน ข','นักเรียน ค','นักเรียน ง','นักเรียน จ',
    'นักเรียน ฉ','นักเรียน ช','นักเรียน ซ','นักเรียน ฌ','นักเรียน ญ'
  ];
  document.getElementById('namesInput').value = sample.join('\n');
  updateWheel();
}

function updateCountBadge() {
  const n = entries.length;
  document.getElementById('nameBadge').textContent = n + ' คน';
  document.getElementById('entryCount').textContent = n + ' รายชื่อ';
}

// ──────────────────────────────────────────────
//  KEYBOARD  (Space = spin)
// ──────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.code === 'Space' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    spin();
  }
  if (e.code === 'Enter' && document.activeElement.tagName !== 'TEXTAREA') {
    if (!document.getElementById('modal').classList.contains('hidden')) closeModal();
  }
  if (e.code === 'Escape') closeModal();
});

// Click wheel to spin
canvas.addEventListener('click', function() { if (!spinning) spin(); });

// ──────────────────────────────────────────────
//  BOOT
// ──────────────────────────────────────────────
loadSample();
</script>
